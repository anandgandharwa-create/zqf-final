<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation Audio</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#071826;
color:#fff;
text-align:center;
}

/* Header */
header{
background:linear-gradient(90deg,#5b2c83,#402060);
padding:18px;
font-size:22px;
font-weight:bold;
}

/* Container */
.container{
padding:20px;
}

/* Cards */
/* 💚 GREEN PREMIUM AUDIO CARDS */

.card{
position:relative;
overflow:hidden;

background: linear-gradient(145deg,#0f2f1f,#071b12);
border-radius:18px;
padding:22px;
margin:16px auto;
max-width:320px;
cursor:pointer;

border:1px solid rgba(0,255,150,0.3);

transition:0.3s;

/* ✨ Soft glow */
box-shadow:
0 0 8px rgba(0,255,150,0.15),
0 0 18px rgba(0,255,150,0.1);

/* 🌿 Breathing effect */
animation: greenBreath 3s infinite ease-in-out;
}

/* 🌿 Breathing Animation */
@keyframes greenBreath{
0%{
box-shadow:
0 0 6px rgba(0,255,150,0.15),
0 0 12px rgba(0,255,150,0.1);
}
50%{
box-shadow:
0 0 18px rgba(0,255,150,0.6),
0 0 35px rgba(0,255,150,0.7);
}
100%{
box-shadow:
0 0 6px rgba(0,255,150,0.15),
0 0 12px rgba(0,255,150,0.1);
}
}

/* 🔥 Hover effect */
.card:hover{
transform:scale(1.05);

box-shadow:
0 0 20px rgba(0,255,150,0.8),
0 0 45px rgba(0,255,150,0.9);

animation:none;
}

/* ✨ Shine effect */
.card::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(0,255,150,0.5),
transparent
);

transition:0.5s;
}

.card:hover::before{
left:120%;
}
.card.active{
border:1px solid rgba(0,255,150,0.9);

box-shadow:
0 0 25px rgba(0,255,150,0.9),
0 0 60px rgba(0,255,150,0.6);

animation:none;
}
/* TEXT */
.title{
font-size:18px;
color:#b6ffd6;
font-weight:600;
}

.title{
font-size:18px;
color:#ffd36b;
}

/* Audio Player */
audio{
margin-top:15px;
width:100%;
display:none;
}
  header{
position:relative;
background:linear-gradient(90deg,#5b2c83,#402060);
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
text-decoration:none;
color:white;
font-size:22px;
background:rgba(255,255,255,0.1);
padding:5px 12px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<a href="../index.html" class="backBtn">←</a>
🧘 Meditation Audios
</header>

<div class="container">

<!-- Audio 1 -->
<div class="card" onclick="playAudio('audio1')">
<div class="title">🎧 Audio 1</div>
<audio id="audio1" src="../audio/audio1.mp3" controls></audio>
</div>

<!-- Audio 2 -->
<div class="card" onclick="playAudio('audio2')">
<div class="title">🎧 Audio 2</div>
<audio id="audio2" src="../audio/audio2.mp3" controls></audio>
</div>

<!-- Audio 3 -->
<div class="card" onclick="playAudio('audio3')">
<div class="title">🎧 Audio 3</div>
<audio id="audio3" src="../audio/audio3.mp3"controls></audio>
</div>

<!-- Audio 4 -->
<div class="card" onclick="playAudio('audio4')">
<div class="title">🎧 Audio 4</div>
<audio id="audio4" src="../audio/audio4.mp3" controls></audio>
</div>

</div>

<script>
function playAudio(id){

// sab card normal karo
document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("active");
});

// sab audio band karo
let audios = document.querySelectorAll("audio");
audios.forEach(a=>{
a.pause();
a.currentTime = 0;
a.style.display = "none";
});

// selected audio
let selected = document.getElementById(id);
selected.style.display = "block";
selected.play();

// active card highlight
selected.parentElement.classList.add("active");
}
</script>

</body>
</html>
