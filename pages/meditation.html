<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation Audio</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#071826;
color:#fff;
text-align:center;
}

/* Header */
header{
background:linear-gradient(90deg,#5b2c83,#402060);
padding:18px;
font-size:22px;
font-weight:bold;
}

/* Container */
.container{
padding:20px;
}

/* Cards */
/* 💚 GREEN PREMIUM AUDIO CARDS */

/* 💚 SOLID GREEN CARDS (NO ANIMATION) */

.card{
background:#00e676;   /* 🔥 solid bright green */
border-radius:18px;
padding:22px;
margin:16px auto;
max-width:320px;
cursor:pointer;

border:2px solid #00ff95;

transition:0.25s;

/* clean glow */
box-shadow:0 8px 20px rgba(0,255,150,0.4);
}

/* hover */
.card:hover{
transform:translateY(-3px);
box-shadow:0 12px 28px rgba(0,255,150,0.7);
}

/* TEXT */
.title{
font-size:18px;
color:#000000; /* contrast dark text */
font-weight:600;
}
/* Audio Player */
audio{
margin-top:15px;
width:100%;
display:none;
}
  header{
position:relative;
background:linear-gradient(90deg,#5b2c83,#402060);
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
text-decoration:none;
color:white;
font-size:22px;
background:rgba(255,255,255,0.1);
padding:5px 12px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<a href="../index.html" class="backBtn">←</a>
🧘 Meditation Audios
</header>

<div class="container">

<!-- Audio 1 -->
<div class="card" onclick="playAudio('audio1')">
<div class="title">🎧 Audio 1</div>
<audio id="audio1" src="../audio/audio1.mp3" controls></audio>
</div>

<!-- Audio 2 -->
<div class="card" onclick="playAudio('audio2')">
<div class="title">🎧 Audio 2</div>
<audio id="audio2" src="../audio/audio2.mp3" controls></audio>
</div>

<!-- Audio 3 -->
<div class="card" onclick="playAudio('audio3')">
<div class="title">🎧 Audio 3</div>
<audio id="audio3" src="../audio/audio3.mp3"controls></audio>
</div>

<!-- Audio 4 -->
<div class="card" onclick="playAudio('audio4')">
<div class="title">🎧 Audio 4</div>
<audio id="audio4" src="../audio/audio4.mp3" controls></audio>
</div>

</div>

<script>
function playAudio(id){

// sab card normal karo
document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("active");
});

// sab audio band karo
let audios = document.querySelectorAll("audio");
audios.forEach(a=>{
a.pause();
a.currentTime = 0;
a.style.display = "none";
});

// selected audio
let selected = document.getElementById(id);
selected.style.display = "block";
selected.play();

// active card highlight
selected.parentElement.classList.add("active");
}
</script>

</body>
</html>
