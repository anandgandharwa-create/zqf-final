<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maun Chakra</title>

<style>

body{
background:#001b1b;
color:white;
font-family:sans-serif;
text-align:center;
padding:30px;
}

h1{
color:#ffd54f;
}

.wheelBox{
position:relative;
width:260px;
margin:auto;
}

.pointer{
width:0;
height:0;
border-left:12px solid transparent;
border-right:12px solid transparent;
border-bottom:20px solid white;
margin:auto;
position:absolute;
left:0;
right:0;
top:-10px;
z-index:2;
}

#wheel{
width:260px;
height:260px;
border-radius:50%;
background:conic-gradient(
red,
orange,
yellow,
lime,
cyan,
blue,
purple,
red
);
transition:transform 2s ease-out;
}

.spinBtn{
margin-top:30px;
background:linear-gradient(45deg,#00e5ff,#00ff99);
border:none;
padding:16px 40px;
font-size:18px;
border-radius:40px;
cursor:pointer;
}

.result{
margin-top:25px;
font-size:18px;
}

</style>
</head>

<body>

<h1>Maun Chakra</h1>

<p>भीतर ठहरने वाले मौन की दिशा पाने के लिए स्पिन करें</p>

<div class="wheelBox">

<div class="pointer"></div>

<div id="wheel"></div>

</div>

<button class="spinBtn" onclick="spinWheel()">Spin</button>

<div id="result" class="result"></div>

<script>

let deg = 0;

const messages=[
"शांत मन में सत्य प्रकट होता है।",
"मौन वह स्थान है जहाँ आत्मा बोलती है।",
"जो भीतर ठहर गया वही जीवन समझ गया।",
"मन शांत करो — उत्तर स्वयं प्रकट होगा।",
"मौन ही ईश्वर का द्वार है।",
"अहंकार शांत करो — सत्य प्रकट होगा।",
"भीतर जाओ — सब कुछ वहीं है।",
"जिस क्षण तुम मौन होते हो उसी क्षण सत्य प्रकट होता है।"
];

function spinWheel(){

let wheel=document.getElementById("wheel");

let random=Math.floor(Math.random()*360);

deg += 720 + random;   // 2 fast rotations

wheel.style.transform="rotate("+deg+"deg)";

setTimeout(()=>{

let msg=messages[Math.floor(Math.random()*messages.length)];

document.getElementById("result").innerText=msg;

},2000);

}

</script>

</body>
</html>
