<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>अंतरज्ञान मार्गदर्शक</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#001a1a,#003333);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;
}

.subtitle{
  text-align:center;
  margin-bottom:15px;
  color:#ccc;
}

.box{
  background:#002626;
  padding:20px;
  border-radius:18px;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  font-size:16px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00cc99;
  color:black;
  font-weight:bold;
}

.answer{
  margin-top:15px;
  padding:12px;
  background:#001f1f;
  border-radius:12px;
  line-height:1.5;
  min-height:60px;
}

.limit{
  text-align:center;
  margin-top:12px;
  color:#ccc;
}

.premium-btn{
  margin-top:10px;
  background:#ffcc00;
}
</style>
</head>

<body>

<div class="container">

<h1>अंतरज्ञान मार्गदर्शक</h1>
<div class="subtitle">अपने मन के सवाल चुनें और तुरंत मार्गदर्शन पाएं</div>

<div class="box">

<select id="q">
<option value="">प्रश्न चुनें...</option>

<option value="1">मुझे शांति क्यों नहीं मिलती?</option>
<option value="2">मेरे पास पैसा क्यों नहीं आता?</option>
<option value="3">मैं बार-बार असफल क्यों होता हूँ?</option>
<option value="4">मेरा मन स्थिर क्यों नहीं रहता?</option>
<option value="5">मैं खुश कैसे रहूँ?</option>
<option value="6">रिश्तों में समस्या क्यों आती है?</option>
<option value="7">मुझे डर क्यों लगता है?</option>
<option value="8">मेरे पास ऊर्जा क्यों नहीं रहती?</option>
<option value="9">जीवन में दिशा कैसे मिले?</option>
<option value="10">मेरी सोच नकारात्मक क्यों है?</option>
<option value="11">मैं खुद पर विश्वास कैसे बढ़ाऊँ?</option>
<option value="12">मुझे गुस्सा क्यों आता है?</option>
<option value="13">मैं ध्यान क्यों नहीं कर पाता?</option>
<option value="14">मैं बार-बार दुखी क्यों हो जाता हूँ?</option>
<option value="15">मेरे निर्णय सही क्यों नहीं होते?</option>
<option value="16">मैं अपने लक्ष्य तक क्यों नहीं पहुँच पा रहा?</option>
<option value="17">मैं अकेला क्यों महसूस करता हूँ?</option>
<option value="18">मुझे motivation क्यों नहीं मिलता?</option>
<option value="19">मेरी आदतें क्यों नहीं बदलती?</option>
<option value="20">मैं जीवन में आगे कैसे बढ़ूँ?</option>

</select>

<button onclick="getAns()">✨ मार्गदर्शन प्राप्त करें</button>

<div class="answer" id="ans">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>

<button class="premium-btn" onclick="goPremium()">💎 Premium लें ₹199</button>

</div>

</div>

<script>

// ===== LIMIT =====
let dailyLimit = 2;
let used = localStorage.getItem("used") || 0;
let premium = localStorage.getItem("premium");

let today = new Date().toDateString();
if(localStorage.getItem("date") !== today){
  localStorage.setItem("used",0);
  localStorage.setItem("date",today);
  used=0;
}

function update(){
  if(premium==="yes"){
    limitText.innerText="💎 Premium (Unlimited)";
  }else{
    limitText.innerText=`Free: ${dailyLimit-used} / 2 बाकी`;
  }
}
update();

// ===== ANSWERS =====
const A = {

1:`शांति बाहर नहीं, भीतर मिलती है। 
मन लगातार अतीत और भविष्य में भागता रहता है। 
जब आप उसे देखना शुरू करते हैं, तब स्थिरता आती है। 
सांसों पर ध्यान लाकर वर्तमान में टिकें।`,

2:`पैसा पहले सोच में आता है, फिर जीवन में प्रकट होता है। 
आपका ध्यान कमी पर है, abundance पर नहीं। 
जहाँ ध्यान जाता है, वहीं ऊर्जा बहती है। 
स्पष्ट दिशा और विश्वास से प्रवाह शुरू होता है।`,

3:`असफलता अंत नहीं, सीख का संकेत है। 
आप प्रयास करते हैं लेकिन निरंतरता टूट जाती है। 
हर गिरावट आपको मजबूत बना रही है। 
धैर्य और लगातार प्रयास ही सफलता की कुंजी है।`,

4:`मन का स्वभाव ही चलायमान है, उसे रोकना संभव नहीं। 
ध्यान का अर्थ विचारों को रोकना नहीं, उन्हें देखना है। 
जब आप साक्षी बनते हैं, मन शांत होने लगता है। 
देखना सीखें, नियंत्रण नहीं करें।`,

5:`खुशी कोई वस्तु नहीं, यह आपकी आंतरिक स्थिति है। 
आप उसे बाहर की चीजों में खोज रहे हैं। 
जब आप स्वयं से जुड़ते हैं, खुशी स्वतः आती है। 
भीतर लौटना ही सच्ची प्रसन्नता है।`,

6:`रिश्तों में समस्या अपेक्षाओं से जन्म लेती है। 
आप समझने से पहले पाने की कोशिश करते हैं। 
सुनना और स्वीकार करना जरूरी है। 
पहले देना सीखें, संबंध सुधरने लगेंगे।`,

7:`डर भविष्य की कल्पना है, वास्तविकता नहीं। 
वर्तमान क्षण में कोई डर नहीं होता। 
जितना आप सोचते हैं, डर उतना बढ़ता है। 
सांसों पर ध्यान लाकर खुद को स्थिर करें।`,

8:`ऊर्जा आपके विचारों से प्रभावित होती है। 
नकारात्मक सोच आपको थका देती है। 
सकारात्मक दिशा में ध्यान देने से ऊर्जा बढ़ती है। 
अपने मन को सही दिशा देना सीखें।`,

9:`दिशा बाहर से नहीं, भीतर की स्पष्टता से आती है। 
आप खुद की आवाज़ को सुन नहीं रहे। 
जब मन शांत होता है, उत्तर स्पष्ट होता है। 
थोड़ा रुकें, भीतर देखें।`,

10:`नकारात्मक सोच एक आदत बन चुकी है। 
आप उसे सच मानकर जी रहे हैं। 
जब आप उसे observe करते हैं, दूरी बनती है। 
धीरे-धीरे यह आदत बदलने लगती है।`,

11:`आत्मविश्वास अचानक नहीं आता, धीरे-धीरे बनता है। 
छोटे-छोटे सफल कदम इसे मजबूत करते हैं। 
आप खुद पर शक करते हैं, इसलिए रुक जाते हैं। 
निरंतर प्रयास से विश्वास बढ़ेगा।`,

12:`गुस्सा नियंत्रण की इच्छा से उत्पन्न होता है। 
जब चीजें आपकी अपेक्षा के अनुसार नहीं होतीं, गुस्सा आता है। 
स्वीकार करना सीखने से गुस्सा कम होता है। 
छोड़ना ही शांति का रास्ता है।`,

13:`ध्यान करने की कोशिश ही बाधा बन रही है। 
ध्यान effort नहीं, awareness है। 
आप जितना प्रयास करते हैं, मन उतना भटकता है। 
बस बैठें और देखें, ध्यान स्वतः होगा।`,

14:`दुख attachment से पैदा होता है। 
आप चीजों और लोगों को पकड़कर रखना चाहते हैं। 
जीवन परिवर्तनशील है, यह स्वीकार करें। 
छोड़ने से ही हल्कापन आता है।`,

15:`निर्णय clarity से आते हैं, confusion से नहीं। 
आपका मन शोर से भरा हुआ है। 
जब आप शांत होते हैं, सही दिशा दिखती है। 
निर्णय लेने से पहले खुद को स्थिर करें।`,

16:`आपका focus बिखरा हुआ है, इसलिए परिणाम नहीं मिल रहा। 
एक साथ कई दिशाओं में चलने से ऊर्जा बंट जाती है। 
एक लक्ष्य तय करें और उसी पर टिकें। 
निरंतरता से ही सफलता मिलती है।`,

17:`अकेलापन तब महसूस होता है जब आप खुद से दूर होते हैं। 
आप दूसरों में जुड़ाव खोज रहे हैं। 
पहले अपने भीतर जुड़ना सीखें। 
खुद के साथ सहज होना ही सच्चा संबंध है।`,

18:`motivation सोच से नहीं, action से आता है। 
आप इंतजार कर रहे हैं कि पहले प्रेरणा मिले। 
छोटा कदम उठाएं, ऊर्जा खुद आएगी। 
कर्म ही प्रेरणा को जन्म देता है।`,

19:`आदतें समय और repetition से बदलती हैं। 
आप जल्दी परिणाम चाहते हैं, इसलिए रुक जाते हैं। 
छोटे बदलाव लगातार करें। 
धीरे-धीरे नई आदत बन जाएगी।`,

20:`जीवन में आगे बढ़ने के लिए clarity और action जरूरी है। 
सिर्फ सोचने से कुछ नहीं बदलता। 
जब दिशा स्पष्ट होती है, रास्ता दिखता है। 
एक कदम बढ़ाएं, रास्ता खुद खुल जाएगा।`

};

// ===== FUNCTION =====
function getAns(){

let q=document.getElementById("q").value;

if(!q){alert("प्रश्न चुनें");return;}

if(premium!=="yes" && used>=dailyLimit){
alert("Free limit खत्म! Premium लें ₹199");
return;
}

ans.innerText=A[q];

if(premium!=="yes"){
used++;
localStorage.setItem("used",used);
update();
}

}

// ===== PREMIUM =====
function goPremium(){
localStorage.setItem("premium","yes");
premium="yes";
alert("🎉 Premium activated");
update();
}

</script>

</body>
</html>
