<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI मार्गदर्शक</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#001a1a,#003333);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;
}

.box{
  background:#002626;
  padding:20px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,255,200,0.15);
}

textarea{
  width:100%;
  height:90px;
  border:none;
  border-radius:12px;
  padding:12px;
  font-size:16px;
  outline:none;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00cc99;
  color:black;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#00ffcc;
}

.answer{
  margin-top:15px;
  padding:12px;
  background:#001f1f;
  border-radius:12px;
  min-height:60px;
  line-height:1.5;
}

.limit{
  text-align:center;
  margin-top:12px;
  color:#ccc;
  font-size:14px;
}

.premium-btn{
  margin-top:10px;
  background:#ffcc00;
}

</style>
</head>

<body>

<div class="container">

<h1>AI मार्गदर्शक</h1>

<div class="box">

<textarea id="question" placeholder="अपना प्रश्न लिखें..."></textarea>

<button onclick="askAI()">पूछें</button>

<div class="answer" id="answer">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>

<button class="premium-btn" onclick="goPremium()">💎 Premium लें</button>

</div>

</div>

<script>

// ===== SETTINGS =====
let dailyLimit = 5;

// ===== STORAGE =====
let used = localStorage.getItem("used") || 0;
let premium = localStorage.getItem("premium");

// ===== DATE RESET =====
let today = new Date().toDateString();
let lastDate = localStorage.getItem("date");

if(lastDate !== today){
  localStorage.setItem("used", 0);
  localStorage.setItem("date", today);
  used = 0;
}

// ===== UPDATE LIMIT UI =====
function updateLimit(){
  if(premium === "yes"){
    document.getElementById("limitText").innerText = "💎 Premium User (Unlimited)";
  } else {
    document.getElementById("limitText").innerText =
      `Free Limit: ${dailyLimit - used} प्रश्न बचे`;
  }
}
updateLimit();

// ===== DUMMY ANSWERS =====
const answers = [
"शांति बाहर नहीं, भीतर मिलती है। अपने विचारों को देखना शुरू करें।",
"मन जितना भागता है, उतनी अशांति होती है। रुकना ही समाधान है।",
"आप अपनी सांसों पर ध्यान दें, वहीं से शांति शुरू होती है।",
"शांति पाने के लिए कुछ छोड़ना पड़ता है — नियंत्रण और चिंता।",
"आप शांत हैं, बस मन शोर कर रहा है। उसे देखो, उससे जुड़ो मत।",
"हर उत्तर आपके भीतर है, बस मन शांत होना चाहिए।",
"जिसे आप ढूंढ रहे हैं, वह आप पहले से ही हैं।",
"चिंता भविष्य की कल्पना है, शांति वर्तमान में है।"
];

// ===== ASK FUNCTION =====
function askAI(){

  let q = document.getElementById("question").value.trim();

  if(!q){
    alert("प्रश्न लिखें");
    return;
  }

  if(premium !== "yes" && used >= dailyLimit){
    alert("Free limit खत्म! Premium लें");
    return;
  }

  document.getElementById("answer").innerText = "सोच रहा है...";

  setTimeout(()=>{

    let random = answers[Math.floor(Math.random() * answers.length)];
    document.getElementById("answer").innerText = random;

    if(premium !== "yes"){
      used++;
      localStorage.setItem("used", used);
      updateLimit();
    }

  }, 800);
}

// ===== PREMIUM =====
function goPremium(){
  localStorage.setItem("premium","yes");
  premium = "yes";
  alert("अब आप Premium User हो गए 🎉");
  updateLimit();
}

</script>

</body>
</html>
