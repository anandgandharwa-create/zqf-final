<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI मार्गदर्शक</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#001a1a,#003333);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;
}

.box{
  background:#002626;
  padding:20px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,255,200,0.15);
}

textarea{
  width:100%;
  height:90px;
  border:none;
  border-radius:12px;
  padding:12px;
  font-size:16px;
  outline:none;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00cc99;
  color:black;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  background:#00ffcc;
}

.answer{
  margin-top:15px;
  padding:12px;
  background:#001f1f;
  border-radius:12px;
  min-height:60px;
  line-height:1.5;
}

.limit{
  text-align:center;
  margin-top:12px;
  color:#ccc;
  font-size:14px;
}

.premium-btn{
  margin-top:10px;
  background:#ffcc00;
}

</style>
</head>

<body>

<div class="container">

<h1>AI मार्गदर्शक</h1>

<div class="box">

<textarea id="question" placeholder="अपना प्रश्न लिखें..."></textarea>

<button onclick="askAI()">पूछें</button>

<div class="answer" id="answer">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>

<button class="premium-btn" onclick="goPremium()">💎 Premium लें</button>

</div>

</div>

<script>

// ===== SETTINGS =====
let dailyLimit = 2; // 🔥 FREE LIMIT = 2

// ===== STORAGE =====
let used = localStorage.getItem("used") || 0;
let premium = localStorage.getItem("premium");

// ===== DATE RESET =====
let today = new Date().toDateString();
let lastDate = localStorage.getItem("date");

if(lastDate !== today){
  localStorage.setItem("used", 0);
  localStorage.setItem("date", today);
  used = 0;
}

// ===== UPDATE LIMIT UI =====
function updateLimit(){
  if(premium === "yes"){
    document.getElementById("limitText").innerText = "💎 Premium User (Unlimited Access)";
  } else {
    document.getElementById("limitText").innerText =
      `Free: ${dailyLimit - used} / 2 प्रश्न बाकी`;
  }
}
updateLimit();

// ===== DUMMY ANSWERS =====
const answers = [
"धन पहले सोच में आता है, फिर जीवन में। अपनी सोच को समृद्ध बनाएं।",
"जहाँ ध्यान जाता है, वहीं ऊर्जा जाती है। आप कमी पर ध्यान दे रहे हैं या अवसर पर?",
"पैसा रुकता नहीं, वह बहता है। अपने भीतर के अवरोध पहचानें।",
"आप योग्य हैं, बस अपने विश्वास को मजबूत करना होगा।",
"कर्म और स्पष्ट दिशा मिलते ही धन स्वतः आने लगता है।",
"जिसे आप खोज रहे हैं, वह आपके अंदर की क्षमता में छिपा है।"
];

// ===== ASK FUNCTION =====
function askAI(){

  let q = document.getElementById("question").value.trim();

  if(!q){
    alert("प्रश्न लिखें");
    return;
  }

  if(premium !== "yes" && used >= dailyLimit){
    alert("आज के 2 Free प्रश्न खत्म!\nPremium लेकर Unlimited पूछें (₹199/month)");
    return;
  }

  document.getElementById("answer").innerText = "सोच रहा है...";

  setTimeout(()=>{

    let random = answers[Math.floor(Math.random() * answers.length)];
    document.getElementById("answer").innerText = random;

    if(premium !== "yes"){
      used++;
      localStorage.setItem("used", used);
      updateLimit();
    }

  }, 700);
}

// ===== PREMIUM =====
function goPremium(){
  localStorage.setItem("premium","yes");
  premium = "yes";
  alert("🎉 अब आप Premium User हो!\nUnlimited Access मिल गया");
  updateLimit();
}

</script>
</body>
</html>
