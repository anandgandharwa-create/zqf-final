<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Quantum Frequency</title>

<style>

/* FULL MOBILE SCREEN */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #003d2b, #001a12);
    color: #e6fff5;
}

/* APP CONTAINER */
.app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* HEADER */
.header {
    text-align: center;
    padding: 25px 10px;  
    font-size: 22px;       /* 👈 बड़ा */
    font-weight: 700;      /* 👈 bold */
    color: #ffd700;        /* 👈 gold feel */
    letter-spacing: 1px;
}
    .header::after {
    content: "";
    display: block;
    height: 2px;
    width: 60%;
   margin: 12px auto 0;  
    background: linear-gradient(90deg, transparent, #00ffaa, transparent);
}
    .header span {
    margin-right: 6px;
    filter: drop-shadow(0 0 5px #00ffaa); /* glow effect */
}

/* CONTENT CENTER */
.main {
    flex: 1;
    display: flex;
    align-items: flex-start;   /* 👈 center हटाकर top कर दिया */
    justify-content: center;
    margin-top: 10px; 
    padding: 25px 15px;  
}

/* CARD PERFECT CENTER */
.card {
    width: 100%;
    max-width: 500px;
    margin-top: -30px;  
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,150,0.2);
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(90deg,#00ffaa,#00cc88);
}

/* PROGRESS */
.progress {
    height: 6px;
    margin: 0 10px;
    background: #002b20;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #00ffaa;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 10px;
    color: #00ffaa;
    font-size: 14px;
}
.features {
    text-align: center;
    margin: 15px 0;
}

.features p {
    margin: 6px 0;
}
 .price {
    text-align: center;
    font-size: 22px;
    color: #e6c200;
    margin: 10px 0;
}

</style>
</head>

<body>

<div class="app">

  <div class="header"><span>🌟</span>Quantum Journey</div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="main">

        <div class="card">

            <h2 style="color:#00ffaa;">🔓 Unlock Your Inner Power</h2>

            <p style="font-size:14px;">
                72 प्रश्न सिर्फ शुरुआत हैं…  
                असली परिवर्तन अब शुरू होता है
            </p>

     <div class="features">
    <p>✨ 400+ Deep Questions</p>
    <p>🧠 गहरा insight</p>
    <p>🎯 Daily सवाल</p>
    <p>📈 Fast Growth</p>
     </div>

            <div style="background:rgba(0,255,150,0.1);padding:12px;border-radius:12px;margin:15px 0;">
                🔥 1000+ लोग जुड़ चुके हैं
            </div>

           <div class="price">₹99 / महीना</div>

            <button onclick="buyNow()">🚀 Coming Soon</button>

        </div>

    </div>

    <div class="footer">⭐ Points: 0</div>

</div>

<script>

let levels = [
{
    name: "Beginner",
    questions: [
        "क्या मैं सच में खुश हूँ?",
        "क्या मैं अपने डर से भाग रहा हूँ?",
        "क्या मैं खुद को समझता हूँ?",
        "क्या मैं अपने जीवन का उद्देश्य जानता हूँ?"
    ]
},
{
    name: "Seeker",
    questions: [
        "क्या मैं अंदर से खाली महसूस करता हूँ?",
        "क्या मैं दूसरों की सोच में जी रहा हूँ?",
        "क्या मैं अपने मन का मालिक हूँ?"
    ]
},
{
    name: "Divine",
    questions: [
        "क्या मैं अपने असली स्वरूप को जानता हूँ?",
        "क्या मैं जीवन को समझ चुका हूँ?"
    ],
    premium: true
}
];

let levelIndex = 0;
let questionIndex = 0;
let points = 0;

function startGame(){
    levelIndex = 0;
    questionIndex = 0;
    points = 0;
    loadQuestion();
}

function loadQuestion(){

    let currentLevel = levels[levelIndex];

    // PREMIUM LOCK
    if(currentLevel.premium){
        document.getElementById("gameBox").innerHTML = `
            <p class="level">🔒 Premium Level</p>
            <p class="lock">आप अब गहराई में प्रवेश करने वाले हैं</p>
            <p>Premium Unlock करें ₹99 / month</p>
            <button>Coming soon</button>
        `;
        return;
    }

    if(questionIndex < currentLevel.questions.length){

        document.getElementById("gameBox").innerHTML = `
            <p class="level">Level ${levelIndex+1} - ${currentLevel.name}</p>
            <p class="question">${currentLevel.questions[questionIndex]}</p>
            <button onclick="answer()">हाँ</button>
            <button onclick="answer()">नहीं</button>
            <button onclick="answer()">पता नहीं</button>
        `;

        updateProgress();

    } else {
        levelIndex++;
        questionIndex = 0;

        if(levelIndex < levels.length){
            loadQuestion();
        } else {
            document.getElementById("gameBox").innerHTML = `
                <h2>✨ Journey Complete</h2>
                <p>आप जागरूकता की ओर बढ़ चुके हैं</p>
                <button onclick="startGame()">Restart</button>
            `;
        }
    }
}

function answer(){
    points += 10;
    questionIndex++;
    document.getElementById("points").innerText = points;
    loadQuestion();
}

function updateProgress(){
    let totalQ = levels[levelIndex].questions.length;
    let percent = (questionIndex / totalQ) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}
    function buyNow(){
    alert("Jal aa raha hai ");
}

</script>

</body>
</html>
