<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Gyan Quest</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: 'Segoe UI';
    background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
    color:white;
}

canvas { display:block; }

.ui {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.1);
    padding:10px 20px;
    border-radius:20px;
    backdrop-filter: blur(15px);
}

.popup {
    position:absolute;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
    max-width:80%;
    text-align:center;
    display:none;
}

.controls {
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn {
    width:60px;
    height:60px;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}
</style>
</head>

<body>

<div class="ui">Consciousness: <span id="score">0</span></div>
<div class="popup" id="popup"></div>

<canvas id="game"></canvas>

<div class="controls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="jump">▲</div>
    <div class="btn" id="right">▶</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let score = 0;
let gravity = 0.6;

const gyan = [
"तुम शरीर नहीं, चेतना हो",
"जो हुआ अच्छा हुआ, जो होगा अच्छा होगा",
"अहंकार ही दुख का कारण है",
"शांति भीतर है, बाहर नहीं",
"वर्तमान ही सत्य है",
"तुम असीम ऊर्जा हो"
];

function showGyan(text){
    let popup = document.getElementById("popup");
    popup.innerText = text;
    popup.style.display = "block";
    setTimeout(()=> popup.style.display="none", 2000);
}

let player = {
    x:100, y:0, w:40, h:40,
    dx:0, dy:0, grounded:false
};

let platforms = [
{x:0,y:canvas.height-40,w:canvas.width,h:40},
{x:200,y:canvas.height-150,w:120,h:20},
{x:400,y:canvas.height-250,w:120,h:20}
];

let coins = [
{x:230,y:canvas.height-180},
{x:430,y:canvas.height-280}
];

let enemies = [
{x:500,y:canvas.height-60,w:40,h:40,dir:1}
];

let keys={};

onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

function update(){

    player.dx=0;
    if(keys["ArrowRight"]) player.dx=5;
    if(keys["ArrowLeft"]) player.dx=-5;

    if(keys[" "] && player.grounded){
        player.dy=-12;
        player.grounded=false;
    }

    player.dy+=gravity;
    player.x+=player.dx;
    player.y+=player.dy;

    player.grounded=false;

    platforms.forEach(p=>{
        if(player.x<p.x+p.w && player.x+player.w>p.x &&
           player.y<p.y+p.h && player.y+player.h>p.y){

            if(player.dy>0){
                player.y=p.y-player.h;
                player.dy=0;
                player.grounded=true;
            }
        }
    });

    coins.forEach((c,i)=>{
        if(player.x<c.x+20 && player.x+player.w>c.x &&
           player.y<c.y+20 && player.y+player.h>c.y){

            showGyan(gyan[Math.floor(Math.random()*gyan.length)]);
            coins.splice(i,1);
            score++;
            document.getElementById("score").innerText=score;
        }
    });

    enemies.forEach(e=>{
        e.x+=e.dir*2;
        if(e.x<400||e.x>700) e.dir*=-1;

        if(player.x<e.x+e.w && player.x+player.w>e.x &&
           player.y<e.y+e.h && player.y+player.h>e.y){

            showGyan("अहंकार ने तुम्हें गिरा दिया");
            setTimeout(()=>location.reload(),1500);
        }
    });

    if(player.y>canvas.height){
        showGyan("तुम गिर गए क्योंकि ध्यान भटक गया");
        setTimeout(()=>location.reload(),1500);
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ffe0";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    ctx.fillStyle="#ffffff";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    ctx.fillStyle="gold";
    coins.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,10,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="red";
    enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
