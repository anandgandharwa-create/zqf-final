<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI मार्गदर्शक</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#001a1a,#003333);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;
}

.box{
  background:#002626;
  padding:20px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(0,255,200,0.15);
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  font-size:16px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#00cc99;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

.answer{
  margin-top:15px;
  padding:12px;
  background:#001f1f;
  border-radius:12px;
  min-height:60px;
  line-height:1.5;
}

.limit{
  text-align:center;
  margin-top:12px;
  color:#ccc;
}

.premium-btn{
  margin-top:10px;
  background:#ffcc00;
}
</style>
</head>

<body>

<div class="container">

<h1>AI मार्गदर्शक</h1>

<div class="box">

<select id="questionSelect">
<option value="">अपना प्रश्न चुनें...</option>

<option value="1">मुझे शांति क्यों नहीं मिलती?</option>
<option value="2">मेरे पास पैसा क्यों नहीं आता?</option>
<option value="3">मन बार-बार भटकता क्यों है?</option>
<option value="4">मैं सफल क्यों नहीं हो पा रहा?</option>
<option value="5">रिश्तों में समस्या क्यों आती है?</option>
<option value="6">मुझे डर क्यों लगता है?</option>
<option value="7">मैं खुश कैसे रहूँ?</option>
<option value="8">मेरी ऊर्जा कम क्यों रहती है?</option>
<option value="9">जीवन में दिशा कैसे मिले?</option>
<option value="10">बार-बार असफलता क्यों मिलती है?</option>

</select>

<button onclick="getAnswer()">उत्तर देखें</button>

<div class="answer" id="answer">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>

<button class="premium-btn" onclick="goPremium()">💎 Premium लें ₹199</button>

</div>

</div>

<script>

// ===== SETTINGS =====
let dailyLimit = 2;

// ===== STORAGE =====
let used = localStorage.getItem("used") || 0;
let premium = localStorage.getItem("premium");

// ===== DATE RESET =====
let today = new Date().toDateString();
let lastDate = localStorage.getItem("date");

if(lastDate !== today){
  localStorage.setItem("used", 0);
  localStorage.setItem("date", today);
  used = 0;
}

// ===== UPDATE UI =====
function updateLimit(){
  if(premium === "yes"){
    document.getElementById("limitText").innerText = "💎 Premium User (Unlimited)";
  } else {
    document.getElementById("limitText").innerText =
      `Free: ${dailyLimit - used} / 2 प्रश्न बाकी`;
  }
}
updateLimit();

// ===== ANSWERS =====
const answers = {
1:"शांति बाहर नहीं, भीतर मिलती है।\nआपका मन लगातार भाग रहा है।\nसांसों पर ध्यान देना शुरू करें।\nधीरे-धीरे शांति प्रकट होगी।",

2:"पैसा पहले सोच में आता है, फिर जीवन में।\nआपका ध्यान कमी पर है, abundance पर नहीं।\nविश्वास और कर्म दोनों जरूरी हैं।\nदिशा स्पष्ट करें।",

3:"मन का स्वभाव ही भटकना है।\nआप उसे रोकने की कोशिश कर रहे हैं।\nदेखना सीखें, रोकना नहीं।\nतभी स्थिरता आएगी।",

4:"सफलता स्पष्ट दिशा मांगती है।\nआपका focus बिखरा हुआ है।\nएक लक्ष्य तय करें।\nनिरंतर प्रयास करें।",

5:"रिश्तों में अपेक्षाएँ ज्यादा होती हैं।\nआप समझने से ज्यादा चाह रहे हैं।\nपहले देना सीखें।\nसंबंध सुधरेंगे।",

6:"डर भविष्य की कल्पना है।\nवर्तमान में डर नहीं होता।\nसांस पर ध्यान लाएं।\nडर कम होने लगेगा।",

7:"खुशी बाहर नहीं मिलती।\nआप उसे चीजों में खोज रहे हैं।\nअपने भीतर लौटें।\nवहीं स्थायी खुशी है।",

8:"ऊर्जा विचारों से जुड़ी है।\nनकारात्मक सोच ऊर्जा गिराती है।\nसकारात्मक दिशा दें।\nऊर्जा बढ़ेगी।",

9:"दिशा clarity से आती है।\nआप खुद को नहीं सुन रहे।\nशांत होकर सोचें।\nउत्तर भीतर है।",

10:"असफलता सीख है, अंत नहीं।\nआप हार मान लेते हैं जल्दी।\nसीखकर आगे बढ़ें।\nसफलता करीब है।"
};

// ===== FUNCTION =====
function getAnswer(){

  let q = document.getElementById("questionSelect").value;

  if(!q){
    alert("प्रश्न चुनें");
    return;
  }

  if(premium !== "yes" && used >= dailyLimit){
    alert("Free limit खत्म! Premium लें ₹199");
    return;
  }

  document.getElementById("answer").innerText = answers[q];

  if(premium !== "yes"){
    used++;
    localStorage.setItem("used", used);
    updateLimit();
  }
}

// ===== PREMIUM =====
function goPremium(){
  localStorage.setItem("premium","yes");
  premium = "yes";
  alert("🎉 अब आप Premium हो गए!");
  updateLimit();
}

</script>

</body>
</html>
