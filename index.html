<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>अंतरज्ञान मार्गदर्शक</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#001a1a,#003333);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(0,255,204,0.5);
}
.subtitle{
  text-align:center;
  margin-bottom:15px;
  color:#ccc;
}

.box{
  background:rgba(0,38,38,0.8);
  padding:20px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow: 
    0 0 25px rgba(0,255,204,0.2),
    inset 0 0 10px rgba(0,255,204,0.1);
  border:1px solid rgba(0,255,204,0.2);
}
select{
  width:100%;
  padding:12px;
  border-radius:12px;
  font-size:15px;
  margin-bottom:12px;
  background:#001f1f;
  color:#FFD700;
  border:1px solid rgba(255,215,0,0.4);
  text-shadow:0 0 6px rgba(255,215,0,0.6);
  transition:0.3s;
}

select:focus{
  outline:none;
  box-shadow:0 0 10px rgba(255,215,0,0.6);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00ffcc,#00cc99);
  color:#002626;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 0 10px rgba(0,255,204,0.4);
  transition:0.3s;
  letter-spacing:0.5px;
}
button:hover{
  transform:scale(1.05);
  box-shadow:0 0 18px rgba(0,255,204,0.7);
}
button:active{
  transform:scale(0.97);
}
.answer{
  margin-top:15px;
  padding:15px;
  background:linear-gradient(180deg,#001f1f,#003333);
  border-radius:14px;
  line-height:1.7;
  min-height:60px;
  border-left:3px solid #00ffcc;
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}
.limit{
  text-align:center;
  margin-top:12px;
  color:#ccc;
}

.premium-btn{
  margin-top:12px;
  background:linear-gradient(45deg,#ffcc00,#ff8800);
  color:black;
  font-weight:bold;
  box-shadow:0 0 15px rgba(255,200,0,0.7);
  transition:0.3s;
}

.premium-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,200,0,1);
}

</style>
</head>

<body>

<div class="container">

<h1>अंतरज्ञान मार्गदर्शक</h1>
<div class="subtitle">अपने मन के सवाल चुनें और तुरंत मार्गदर्शन पाएं</div>

<div class="box">
<select id="category" onchange="loadQuestions()">
<option value="">श्रेणी चुनें...</option>

<option value="family">👨‍👩‍👧 पारिवारिक प्रश्न</option>
<option value="social">🌍 सामाजिक प्रश्न</option>
<option value="money">💰 आर्थिक प्रश्न</option>
<option value="spiritual">🧘 आध्यात्मिक प्रश्न</option>

</select>

<select id="q">
<option value="">प्रश्न चुनें...</option>
</select>
<button onclick="getAns()">✨ मार्गदर्शन प्राप्त करें</button>

<div class="answer" id="ans">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>

<button class="premium-btn" onclick="goPremium()">💎 Premium लें ₹199</button>

</div>

</div>

<script>

// ===== LIMIT =====
let dailyLimit = 2;
let used = localStorage.getItem("used") || 0;
let premium = localStorage.getItem("premium");

let today = new Date().toDateString();
if(localStorage.getItem("date") !== today){
  localStorage.setItem("used",0);
  localStorage.setItem("date",today);
  used=0;
}

function update(){
  let limitText = document.getElementById("limitText");

  if(premium==="yes"){
    limitText.innerText="💎 Premium (Unlimited)";
  }else{
    limitText.innerText=`Free: ${dailyLimit-used} / 2 बाकी`;
  }
}
update();


// ===== QUESTIONS =====

const Q = {

family:[
{q:"घर में शांति कैसे बनाए रखें?", a:"घर में शांति के लिए पहले स्वयं शांत बनें। संवाद बढ़ाएं और अपेक्षाएँ कम करें।"},
{q:"परिवार में तनाव क्यों होता है?", a:"तनाव गलतफहमी, अपेक्षाओं और संवाद की कमी से पैदा होता है। सुनना सीखें।"},
{q:"माता-पिता से संबंध कैसे सुधारें?", a:"सम्मान और धैर्य से बात करें। उनकी भावनाओं को समझें और समय दें।"},
{q:"पति-पत्नी में समझ कैसे बढ़े?", a:"खुलकर संवाद करें, एक-दूसरे को सुनें और ego को कम करें।"},
{q:"परिवार में सम्मान कैसे मिले?", a:"पहले दूसरों को सम्मान दें, आपका व्यवहार ही आपकी पहचान बनाता है।"},
{q:"बच्चों को सही मार्ग कैसे दें?", a:"उन्हें समझें, प्यार से मार्गदर्शन करें, और खुद उदाहरण बनें।"},
{q:"घर में प्रेम कैसे बढ़े?", a:"छोटी-छोटी बातों में appreciation और care दिखाएं।"},
{q:"परिवार में झगड़े कैसे रोकें?", a:"गुस्से में प्रतिक्रिया देने से पहले रुकें और समझदारी से जवाब दें।"},
{q:"रिश्तों को मजबूत कैसे करें?", a:"समय दें, विश्वास बनाए रखें और दिल से जुड़ें।"}
],

social:[
{q:"लोग मुझे समझते क्यों नहीं?", a:"आप खुद को स्पष्ट रूप से व्यक्त नहीं कर पा रहे हैं। संवाद सुधारें।"},
{q:"समाज में सम्मान कैसे मिले?", a:"अपने कार्य और व्यवहार से पहचान बनाएं।"},
{q:"दोस्ती कैसे निभाएं?", a:"ईमानदारी, विश्वास और समय देना जरूरी है।"},
{q:"लोगों से डर कैसे खत्म करें?", a:"आत्मविश्वास बढ़ाएं और खुद को स्वीकार करें।"},
{q:"सामाजिक दबाव कैसे संभालें?", a:"अपनी सोच पर भरोसा रखें, दूसरों की राय से प्रभावित न हों।"},
{q:"लोगों की सोच से कैसे बाहर निकलें?", a:"अपनी दिशा तय करें और उसी पर टिके रहें।"},
{q:"आत्मविश्वास से बात कैसे करें?", a:"practice करें और खुद पर भरोसा रखें।"},
{q:"समाज में पहचान कैसे बनाएं?", a:"लगातार अच्छा कार्य करें, पहचान खुद बनेगी।"},
{q:"लोगों से जुड़ाव कैसे बढ़ाएं?", a:"सुनना सीखें और genuine interest दिखाएं।"}
],

money:[
{q:"पैसा क्यों नहीं टिकता?", a:"खर्च पर नियंत्रण और सही planning की कमी है।"},
{q:"आय कैसे बढ़ाएं?", a:"नई skills सीखें और multiple sources बनाएं।"},
{q:"खर्च कैसे नियंत्रित करें?", a:"budget बनाएं और unnecessary खर्च कम करें।"},
{q:"अमीर मानसिकता कैसे बनाएं?", a:"abundance mindset अपनाएं और positive सोच रखें।"},
{q:"व्यवसाय कैसे शुरू करें?", a:"छोटे से शुरू करें, consistency रखें और सीखते रहें।"},
{q:"पैसे की चिंता कैसे खत्म करें?", a:"planning करें और long-term सोच विकसित करें।"},
{q:"financial stability कैसे पाएं?", a:"saving + investment दोनों जरूरी हैं।"},
{q:"निवेश कैसे करें?", a:"knowledge लेकर सही जगह निवेश करें।"},
{q:"धन आकर्षित कैसे करें?", a:"सकारात्मक सोच और सही action से धन आता है।"}
],

spiritual:[
{q:"मन शांत कैसे करें?", a:"सांसों पर ध्यान दें और वर्तमान में रहें।"},
{q:"ध्यान कैसे शुरू करें?", a:"रोज 5-10 मिनट शांत बैठें और विचारों को देखें।"},
{q:"ईश्वर को कैसे महसूस करें?", a:"भीतर की शांति और जागरूकता में ईश्वर का अनुभव होता है।"},
{q:"जीवन का उद्देश्य क्या है?", a:"स्वयं को जानना और अपनी क्षमता को प्रकट करना।"},
{q:"आत्मज्ञान कैसे प्राप्त करें?", a:"ध्यान, स्व-अवलोकन और सत्संग से।"},
{q:"अहंकार कैसे छोड़ें?", a:"स्वयं को observe करें और accept करें।"},
{q:"वर्तमान में कैसे जियें?", a:"अतीत और भविष्य छोड़कर अभी पर ध्यान दें।"},
{q:"आध्यात्मिक प्रगति कैसे करें?", a:"नियमित साधना और जागरूकता से।"},
{q:"भीतर की आवाज़ कैसे सुनें?", a:"मन को शांत करें, उत्तर भीतर से आएगा।"}
]

};


// ===== LOAD QUESTIONS =====
function loadQuestions(){

let cat = document.getElementById("category").value;
let q = document.getElementById("q");

q.innerHTML = '<option value="">प्रश्न चुनें...</option>';

if(Q[cat]){
  Q[cat].forEach((item,i)=>{
    q.innerHTML += `<option value="${cat}-${i}">${item.q}</option>`;
  });

  q.size = Q[cat].length; // 👈 show all
}

}

// ===== GET ANSWER =====
function getAns(){

let val = document.getElementById("q").value;

if(!val){
  alert("प्रश्न चुनें");
  return;
}

let parts = val.split("-");
let cat = parts[0];
let index = parts[1];

let selected = Q[cat][index];

if(premium!=="yes" && used>=dailyLimit){
  alert("Free limit खत्म! Premium लें ₹199");
  return;
}

// loading effect
let ans = document.getElementById("ans");

ans.innerText="✨ संदेश प्राप्त हो रहा है...";

setTimeout(()=>{

ans.innerText="✨ संदेश प्राप्त हो रहा है...\n\n" + selected.a;

  if(premium!=="yes"){
    used++;
    localStorage.setItem("used",used);
    update();
  }

},3000);

}


// ===== PREMIUM =====
function goPremium(){
localStorage.setItem("premium","yes");
premium="yes";
alert("🎉 Premium activated");
update();
}

</script>

</body>
</html>
