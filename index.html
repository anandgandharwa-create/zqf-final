<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Gyan Adventure</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at top, #1a2a6c, #000);
}

/* Glass UI */
.ui {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    background:rgba(255,255,255,0.1);
    padding:10px 25px;
    border-radius:30px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    font-weight:bold;
}

/* Controls premium */
.btn {
    width:65px;
    height:65px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    font-size:24px;
}
    .controls {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    z-index:5; /* important */
}
</style>
</head>

<body>

<div class="ui">⚡ Level: <span id="level">1</span> | Gyan: <span id="score">0</span></div>
<div class="popup" id="popup"></div>

<canvas id="game"></canvas>

<div class="controls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="jump">▲</div>
    <div class="btn" id="right">▶</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let cameraX = 0;
let level = 1;
let score = 0;

const gyan = [
"तुम शरीर नहीं, चेतना हो 🧘‍♂️",
"वर्तमान ही सत्य है ⏳",
"अहंकार ही दुख है 😌",
"शांति भीतर है ✨",
"तुम असीम ऊर्जा हो ⚡"
];

function popup(text){
    let p = document.getElementById("popup");
    p.innerText = text;
    p.style.display="block";
    setTimeout(()=>p.style.display="none",2000);
}

let player = {
    x:100,
    y:300,
    w:40,
    h:40,
    dx:0,
    dy:0,
    ground:false
};

let gravity = 0.7;

function generateLevel(){
    platforms = [];
    coins = [];

    for(let i=0;i<20;i++){
        let x = i*250;
        let y = canvas.height - (Math.random()*200 + 100);

        platforms.push({x:x,y:y,w:150,h:20});

        if(Math.random()>0.5){
            coins.push({x:x+50,y:y-30});
        }
    }
}

let platforms = [];
let coins = [];
generateLevel();

let keys = {};

onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// mobile
left.ontouchstart=()=>keys["ArrowLeft"]=true;
left.ontouchend=()=>keys["ArrowLeft"]=false;

right.ontouchstart=()=>keys["ArrowRight"]=true;
right.ontouchend=()=>keys["ArrowRight"]=false;

jump.ontouchstart=()=>keys[" "]=true;
jump.ontouchend=()=>keys[" "]=false;

function update(){

    player.dx = 0;

    if(keys["ArrowRight"]) player.dx = 6;
    if(keys["ArrowLeft"]) player.dx = -6;

    if(keys[" "] && player.ground){
        player.dy = -14;
        player.ground = false;
    }

    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;

    player.ground = false;

    platforms.forEach(p=>{
        if(player.x < p.x+p.w &&
           player.x+player.w > p.x &&
           player.y < p.y+p.h &&
           player.y+player.h > p.y){

            if(player.dy > 0){
                player.y = p.y - player.h;
                player.dy = 0;
                player.ground = true;
            }
        }
    });

    coins.forEach((c,i)=>{
        if(player.x < c.x+20 &&
           player.x+player.w > c.x &&
           player.y < c.y+20 &&
           player.y+player.h > c.y){

            coins.splice(i,1);
            score++;
            document.getElementById("score").innerText = score;

            if(score % 3 === 0){
                popup(gyan[Math.floor(Math.random()*gyan.length)]);
            }
        }
    });

    // camera follow
    cameraX = player.x - 200;

    // next level
    if(player.x > platforms.length*250){
        level++;
        document.getElementById("level").innerText = level;
        player.x = 100;
        generateLevel();
        popup("🎉 Level " + level + " Unlock!");
    }

    if(player.y > canvas.height){
        popup("⚠️ ध्यान भटक गया");
        setTimeout(()=>location.reload(),1500);
    }
}

function draw(){

    // sky gradient animation
    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
    gradient.addColorStop(0,"#141E30");
    gradient.addColorStop(1,"#243B55");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(-cameraX,0);

    // 🌟 glow effect function
    function glow(color,blur){
        ctx.shadowColor = color;
        ctx.shadowBlur = blur;
    }

    // ☁️ clouds
  // ☁️ smooth clouds (better design)
ctx.globalAlpha = 0.4;

for(let i=0;i<4;i++){
    let x = (i*500 + (Date.now()*0.03 % 500));

    ctx.fillStyle = "#fff";

    ctx.beginPath();
    ctx.arc(x, 100, 30, 0, Math.PI*2);
    ctx.arc(x+30, 90, 35, 0, Math.PI*2);
    ctx.arc(x+60, 100, 30, 0, Math.PI*2);
    ctx.fill();
}

ctx.globalAlpha = 1;

    // 🧘‍♂️ player glow
    glow("#00ffe0",20);
    ctx.font="40px serif";
    ctx.fillText("🧘‍♂️", player.x, player.y+35);

    ctx.shadowBlur = 0;

    // platforms (neon)
    ctx.fillStyle="#ffffff";
    platforms.forEach(p=>{
        glow("#00f2ff",10);
        ctx.fillRect(p.x,p.y,p.w,p.h);
    });

    ctx.shadowBlur = 0;

    // ✨ coins glow animation
    coins.forEach(c=>{
        glow("gold",15);
        ctx.font="28px serif";
        ctx.fillText("✨",c.x,c.y + Math.sin(Date.now()/200)*5);
    });

    ctx.shadowBlur = 0;

    ctx.restore();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
