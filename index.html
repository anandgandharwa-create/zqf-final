<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decision Clarity</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top,#0f0c29,#302b63,#24243e);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:360px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow:0 0 25px rgba(0,255,255,0.2);
    text-align:center;
}

.title{
    font-size:22px;
    margin-bottom:20px;
    color:#00eaff;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#ffffff10;
    color:#fff;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00eaff,#00ffa3);
    color:#000;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:#00000040;
    font-size:16px;
}

.glow{
    text-shadow:0 0 10px #00eaff;
}

.footer{
    margin-top:15px;
    font-size:12px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="card">
    <div class="title glow">🧠 निर्णय स्पष्टता</div>

    <input type="number" id="benefit" placeholder="फायदे (1-10)">
    <input type="number" id="loss" placeholder="नुकसान (1-10)">

    <select id="intuition">
        <option value="">अंतर की आवाज़?</option>
        <option value="yes">हाँ 👍</option>
        <option value="no">नहीं 👎</option>
    </select>

    <button onclick="calculate()">✨ परिणाम देखें</button>

    <div class="result" id="output"></div>

    <div class="footer">
        यह केवल मार्गदर्शन है, अंतिम निर्णय आपका है
    </div>
</div>

<script>
function calculate(){
    let benefit = parseInt(document.getElementById("benefit").value);
    let loss = parseInt(document.getElementById("loss").value);
    let intuition = document.getElementById("intuition").value;

    if(!benefit || !loss || intuition===""){
        document.getElementById("output").innerHTML = "⚠️ सभी जानकारी भरें";
        return;
    }

    let score = benefit - loss;

    if(intuition === "yes"){
        score += 3;
    } else {
        score -= 3;
    }

    let percent = Math.min(Math.max((score + 10) * 5, 0), 100);

    let message = "";

    if(percent > 70){
        message = "🚀 ऊर्जा संकेत दे रही है — आगे बढ़ें";
    } 
    else if(percent > 40){
        message = "⏳ रुकें, और भीतर स्पष्टता लाएँ";
    } 
    else {
        message = "⚠️ अभी निर्णय न लें";
    }

    document.getElementById("output").innerHTML =
        "<div class='glow'>स्पष्टता स्कोर: " + percent + "%</div><br>" + message +
        "<br><br>🔮 गहराई के लिए Divine Access खोलें";
}
</script>

</body>
</html>
