<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quantum Gyan Adventure</title>

<style>
body {
    margin:0;
    overflow:hidden;
    touch-action:none;
    background: radial-gradient(circle at top, #1a2a6c, #000);
}

/* Glass UI */
.ui {
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    
    color:#FFD700;
    background:rgba(0,0,0,0.75);
    
    padding:10px 20px;
    border-radius:25px;
    
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;

    font-size:16px;
    font-weight:bold;
    
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
    
    letter-spacing: 0.5px;
}
/* Controls premium */
.controls {
    position:fixed;
    bottom:0;
    width:100%;
    
    display:flex;
    justify-content:center;
    gap:25px;

    padding:15px 0;
    
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);

    border-top:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
}

@media (max-width:600px){
    .btn{
        width:60px;
        height:60px;
        font-size:22px;
    }

    .ui{
        font-size:14px;
        padding:8px 15px;
    }
}
.btn {
    width:65px;
    height:65px;
    border-radius:50%;

    background: linear-gradient(145deg, #FFD700, #FF8C00);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:26px;
    color:black;

    box-shadow: 
        0 4px 10px rgba(0,0,0,0.5),
        inset 0 2px 5px rgba(255,255,255,0.3);

    transition: 0.15s;
}

.btn:active {
    transform: scale(0.9);
    box-shadow: 0 2px 5px rgba(0,0,0,0.6);
}
   .popup {
    position:fixed;
    top:40%;   /* 🔥 50% से 40% कर दिया */
    left:50%;
    transform:translate(-50%, -50%);
    
    color:#FFD700;
    background:rgba(0,0,0,0.85);
    
    padding:20px 30px;
    border-radius:16px;
    
    font-size:22px;
    font-weight:bold;
    
    text-align:center;
    display:none;
    z-index:9999;

    box-shadow:0 0 25px rgba(255,215,0,0.7);
    text-shadow: 0 0 8px black;
}
    body, .btn {
    user-select: none;          /* text select बंद */
    -webkit-user-select: none;
    -ms-user-select: none;

    -webkit-touch-callout: none; /* iPhone popup बंद */
}
    /* 🔥 Glow Card */
.card {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(15px);
    
    border-radius: 18px;
    padding: 14px 22px;
    
    color: #FFD700;
    text-align: center;
    
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
    
    max-width: 85%;
    font-size: 15px;
}

/* 🔥 Fade Animation */
.fade {
    animation: fadeIn 0.6s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform:translate(-50%, -20px);}
    to {opacity:1; transform:translate(-50%, 0);}
}
</style>
</head>

<body>

<div class="ui">⚡ Level: <span id="level">1</span> | Gyan: <span id="score">0</span></div>
<div class="popup" id="popup"></div>
<div class="card fade" id="qaBox" style="display:none;"></div>
<canvas id="game"></canvas>

<div class="controls">
    <div class="btn" id="left">⬅️</div>
    <div class="btn" id="jump">⏫</div>
    <div class="btn" id="right">➡️</div>
</div>
<script>
const left = document.getElementById("left");
const right = document.getElementById("right");
const jump = document.getElementById("jump");
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 80;

let cameraX = 0;
let level = 1;
let score = 0;
let lastGyanScore = 0;
let popupActive = false;

const gyanFlow = [
{
q: "तुम दुखी क्यों हो?",
a: "क्योंकि तुम जो बदल रहा है, उसे स्थायी मान रहे हो।"
},
{
q: "तुम्हें शांति क्यों नहीं मिलती?",
a: "क्योंकि तुम बाहर ढूंढ रहे हो, जो भीतर है।"
},
{
q: "डर कहाँ से आता है?",
a: "भविष्य की कल्पना से।"
},
{
q: "तुम कौन हो?",
a: "वह जो देख रहा है… न कि जो दिख रहा है।"
}
];

let popupTimeout;

function showQA(){
    let box = document.getElementById("qaBox");

    let item = gyanFlow[Math.floor(Math.random()*gyanFlow.length)];

    box.innerHTML = `
    ⚡ <b>${item.q}</b><br><br>
    🕉 ${item.a}
    `;

    box.style.display = "block";

    setTimeout(()=>{
        box.style.display = "none";
    },3000);
}

// 🔥 FIXED PLAYER
let player = {
    x:100,
    y:canvas.height - 120,
    w:40,
    h:40,
    dx:0,
    dy:0,
    ground:false
};

let gravity = 0.5;
let platforms = [];
let coins = [];

function generateLevel(){
    platforms = [];
    coins = [];

    for(let i=0;i<20;i++){
        let x = i*250;
        let y = canvas.height - (Math.random()*200 + 120);

        platforms.push({x:x,y:y,w:150,h:20});

        if(Math.random()>0.5){
            coins.push({x:x+50,y:y-30});
        }
    }
}

generateLevel();

let keys = {};

onkeydown = e=>{
    if(!popupActive){
        keys[e.key] = true;

        if((e.code === "Space" || e.key === " ") && player.ground){
            player.dy = -16;
            player.ground = false;
        }
    }
};
onkeyup = e=> keys[e.key]=false;

function resetKeys(){ keys = {}; }

// controls
left.onmousedown = ()=> keys["ArrowLeft"]=true;
left.onmouseup = resetKeys;
left.ontouchstart = ()=> keys["ArrowLeft"]=true;
left.ontouchend = resetKeys;

right.onmousedown = ()=> keys["ArrowRight"]=true;
right.onmouseup = resetKeys;
right.ontouchstart = ()=> keys["ArrowRight"]=true;
right.ontouchend = resetKeys;

// 🔥 FIXED JUMP
    jump.onmousedown = ()=>{
    if(player.ground){
        player.dy = -16;
        player.ground = false;
    }
jump.ontouchstart = ()=>{
    if(player.ground){
        player.dy = -16;
        player.ground = false;
    }
};
jump.ontouchend = resetKeys;

function update(){

    if(popupActive) return;

    player.dx = 0;

    if(keys["ArrowRight"]) player.dx = 6;
    if(keys["ArrowLeft"]) player.dx = -6;

    if(keys[" "] && player.ground){
        player.dy = -16;
        player.ground = false;
    }

    // gravity
    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;

    player.ground = false;

    // 🟡 PLATFORM COLLISION
    platforms.forEach(p=>{
        if(player.x < p.x+p.w &&
           player.x+player.w > p.x &&
           player.y < p.y+p.h &&
           player.y+player.h > p.y){

            if(player.dy > 0 && player.y + player.h - player.dy <= p.y){
                player.y = p.y - player.h;
                player.dy = 0;
                player.ground = true;
            }
        }
    });

    // 🟢 GROUND COLLISION (MOST IMPORTANT FIX)
    if(player.y + player.h >= canvas.height - 80){
        player.y = canvas.height - 80 - player.h;
        player.dy = 0;
        player.ground = true;
    }

    // coins
    coins.forEach((c,i)=>{
        if(player.x < c.x+20 &&
           player.x+player.w > c.x &&
           player.y < c.y+20 &&
           player.y+player.h > c.y){

            coins.splice(i,1);
            score++;
            document.getElementById("score").innerText = score;

           if(score % 3 === 0 && score !== lastGyanScore){
    lastGyanScore = score;
    showQA(); // 🔥 नया system
}
            if(score === 5){
    popup("⚖️ क्या तुम परिणाम चाहते हो या शांति?");
}
        }
    });

    let targetX = player.x - 200;
    cameraX += (targetX - cameraX) * 0.08;
    cameraX = Math.max(0, cameraX);

    if(player.x > platforms.length*250){
        level++;
        cameraX = 0;
        player.x = 100;
        document.getElementById("level").innerText = level;
        generateLevel();
        popup("🎉 Level " + level + " Unlock!");
    }

    if(player.y > canvas.height){
        popup("⚠️ ध्यान भटक गया");

        setTimeout(()=>{
            player.x = 100;
            player.y = canvas.height - 120;
            player.dy = 0;
            score = 0;
            lastGyanScore = 0;
            cameraX = 0;
            document.getElementById("score").innerText = score;
            generateLevel();
        },1500);
    }
}

function draw(){

    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
    gradient.addColorStop(0,"#141E30");
    gradient.addColorStop(1,"#243B55");
    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(-cameraX,0);

    ctx.fillStyle="#eee";
    for(let i=0;i<4;i++){
        let x=i*500 + (Date.now()*0.02 % 500);
        ctx.beginPath();
        ctx.arc(x,100,30,0,Math.PI*2);
        ctx.arc(x+30,90,35,0,Math.PI*2);
        ctx.arc(x+60,100,30,0,Math.PI*2);
        ctx.fill();
    }

    ctx.fillStyle="#2c5e3f";
    ctx.beginPath();
    ctx.moveTo(-cameraX, canvas.height);
    ctx.lineTo(0 - cameraX, canvas.height - 200);
    ctx.lineTo(300 - cameraX, canvas.height);
    ctx.lineTo(300 - cameraX, canvas.height - 180);
    ctx.lineTo(700 - cameraX, canvas.height);
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle="#27ae60";
    ctx.fillRect(-cameraX, canvas.height - 80, canvas.width + 300, 80);

    // player
    ctx.font="50px serif";
    ctx.fillText("🧘‍♂️", player.x, player.y+35);

    platforms.forEach(p=>{
        ctx.fillStyle="#FFD700";
        ctx.fillRect(p.x,p.y,p.w,p.h);
    });

    coins.forEach(c=>{
        ctx.font="35px serif";
        ctx.fillText("🏆",c.x,c.y + Math.sin(Date.now()/200)*5);
    });

    ctx.restore();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

window.onresize = ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 80;
};
</script>
</body>
</html>
