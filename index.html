<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Zero Quantum Frequency</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #003d2b, #001a12);
    color: #e6fff5;
    text-align: center;
}

/* HEADER */
h1 {
    color: #e6c200;
    margin-top: 20px;
    letter-spacing: 1px;
}

/* CARD */
.card {
    background: rgba(0, 0, 0, 0.5);
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 420px;
    box-shadow: 0 0 25px rgba(0,255,150,0.25);
    transition: 0.3s;
}

/* QUESTION */
.question {
    font-size: 18px;
    margin-bottom: 20px;
}

/* BUTTON */
button {
    width: 85%;
    margin: 8px auto;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #00cc88, #00ffaa);
    color: black;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* PROGRESS */
.progress {
    height: 10px;
    background: #002b20;
    border-radius: 20px;
    overflow: hidden;
    margin: 20px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ffaa, #00cc88);
}

/* LEVEL TEXT */
.level {
    font-size: 14px;
    color: #aaffdd;
}

/* POINTS */
.points {
    margin-top: 10px;
    font-size: 18px;
    color: #00ffaa;
}

/* LOCK SCREEN */
.lock {
    color: #ffcc00;
    font-size: 16px;
}

</style>
</head>

<body>

<h1>🎮 Quantum Journey</h1>

<div class="progress">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="card" id="gameBox">
    <p class="level">Level 1 - Beginner</p>
    <p class="question">अपनी यात्रा शुरू करें</p>
    <button onclick="startGame()">Start Journey</button>
</div>

<div class="points">⭐ Points: <span id="points">0</span></div>

<script>

let levels = [
{
    name: "Beginner",
    questions: [
        "क्या मैं सच में खुश हूँ?",
        "क्या मैं अपने डर से भाग रहा हूँ?",
        "क्या मैं खुद को समझता हूँ?",
        "क्या मैं अपने जीवन का उद्देश्य जानता हूँ?"
    ]
},
{
    name: "Seeker",
    questions: [
        "क्या मैं अंदर से खाली महसूस करता हूँ?",
        "क्या मैं दूसरों की सोच में जी रहा हूँ?",
        "क्या मैं अपने मन का मालिक हूँ?"
    ]
},
{
    name: "Divine",
    questions: [
        "क्या मैं अपने असली स्वरूप को जानता हूँ?",
        "क्या मैं जीवन को समझ चुका हूँ?"
    ],
    premium: true
}
];

let levelIndex = 0;
let questionIndex = 0;
let points = 0;

function startGame(){
    levelIndex = 0;
    questionIndex = 0;
    points = 0;
    loadQuestion();
}

function loadQuestion(){

    let currentLevel = levels[levelIndex];

    // PREMIUM LOCK
    if(currentLevel.premium){
        document.getElementById("gameBox").innerHTML = `
            <p class="level">🔒 Premium Level</p>
            <p class="lock">आप अब गहराई में प्रवेश करने वाले हैं</p>
            <p>Premium Unlock करें ₹99 / month</p>
            <button>Upgrade Now</button>
        `;
        return;
    }

    if(questionIndex < currentLevel.questions.length){

        document.getElementById("gameBox").innerHTML = `
            <p class="level">Level ${levelIndex+1} - ${currentLevel.name}</p>
            <p class="question">${currentLevel.questions[questionIndex]}</p>
            <button onclick="answer()">हाँ</button>
            <button onclick="answer()">नहीं</button>
            <button onclick="answer()">पता नहीं</button>
        `;

        updateProgress();

    } else {
        levelIndex++;
        questionIndex = 0;

        if(levelIndex < levels.length){
            loadQuestion();
        } else {
            document.getElementById("gameBox").innerHTML = `
                <h2>✨ Journey Complete</h2>
                <p>आप जागरूकता की ओर बढ़ चुके हैं</p>
                <button onclick="startGame()">Restart</button>
            `;
        }
    }
}

function answer(){
    points += 10;
    questionIndex++;
    document.getElementById("points").innerText = points;
    loadQuestion();
}

function updateProgress(){
    let totalQ = levels[levelIndex].questions.length;
    let percent = (questionIndex / totalQ) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

</script>

</body>
</html>
