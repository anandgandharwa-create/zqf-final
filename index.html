<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>मन शांति कैलकुलेटर</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#0f172a; /* deep dark blue */
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:360px;
    padding:22px;
    border-radius:16px;
    background:#1e293b; /* solid dark card */
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    text-align:center;
}

.title{
    font-size:20px;
    margin-bottom:18px;
    color:#cbd5f5; /* soft light */
    font-weight:500;
}

select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:#e2e8f0;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:#2563eb; /* simple blue */
    color:#fff;
    font-weight:500;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:18px;
    padding:14px;
    border-radius:10px;
    background:#0f172a;
    border:1px solid #334155;
    font-size:14px;
    line-height:1.6;
}

.footer{
    margin-top:10px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">🌿 मन शांति</div>

    <select id="mood">
        <option value="">आप अभी कैसा महसूस कर रहे हैं?</option>
        <option value="stress">तनाव 😣</option>
        <option value="anger">गुस्सा 😡</option>
        <option value="fear">डर 😰</option>
        <option value="sad">उदासी 😔</option>
    </select>

    <button onclick="calm()">✨ शांति प्राप्त करें</button>

    <div class="result" id="output"></div>

    <div class="footer">
        30 सेकंड दें — मन बदल जाएगा
    </div>
</div>

<script>
function calm(){
    let mood = document.getElementById("mood").value;

    if(mood === ""){
        document.getElementById("output").innerHTML = "⚠️ पहले अपना भाव चुनें";
        return;
    }

    let result = "";

    if(mood === "stress"){
        result = "🌬 4-7-8 श्वास लें (4 सेकंड inhale, 7 रोकें, 8 exhale)<br><br>🧘 मंत्र: मैं सुरक्षित हूँ<br><br>⏳ 7 बार दोहराएँ";
    }

    if(mood === "anger"){
        result = "🔥 गहरी सांस लें और धीरे छोड़ें<br><br>🧘 मंत्र: मैं शांत हूँ<br><br>⏳ 10 बार दोहराएँ";
    }

    if(mood === "fear"){
        result = "🌿 लंबी धीमी सांस लें<br><br>🧘 मंत्र: सब ठीक है<br><br>⏳ 1 मिनट ध्यान करें";
    }

    if(mood === "sad"){
        result = "💫 छाती पर हाथ रखें और सांस महसूस करें<br><br>🧘 मंत्र: मैं पर्याप्त हूँ<br><br>⏳ 8 बार दोहराएँ";
    }

    document.getElementById("output").innerHTML =
        result + "<br><br>🔮 गहराई के लिए Divine Access खोलें";

    // optional vibration (mobile)
    if(navigator.vibrate){
        navigator.vibrate(100);
    }
}
</script>

</body>
</html>
