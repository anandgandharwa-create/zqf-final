<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Guide</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#001a1a,#003333);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;
}

.box{
  background:#002626;
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,255,200,0.2);
}

textarea{
  width:100%;
  height:80px;
  border:none;
  border-radius:10px;
  padding:10px;
  font-size:16px;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00cc99;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00ffcc;
}

.answer{
  margin-top:15px;
  padding:10px;
  background:#001f1f;
  border-radius:10px;
  min-height:50px;
}

.limit{
  text-align:center;
  margin-top:10px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="container">

<h1>AI मार्गदर्शक</h1>

<div class="box">
<textarea id="question" placeholder="अपना प्रश्न लिखें..."></textarea>

<button onclick="askAI()">पूछें</button>

<div class="answer" id="answer">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>
</div>

</div>

<script>

// ====== SETTINGS ======
const API_KEY = "YOUR_API_KEY_HERE"; // यहाँ अपनी API key डालो

// Free limit
let dailyLimit = 5;

// Load usage
let used = localStorage.getItem("used") || 0;

// Premium check
let premium = localStorage.getItem("premium");

// Reset daily (simple version)
let lastDate = localStorage.getItem("date");
let today = new Date().toDateString();

if(lastDate !== today){
  localStorage.setItem("used", 0);
  localStorage.setItem("date", today);
  used = 0;
}

// Update UI
function updateLimit(){
  if(premium === "yes"){
    document.getElementById("limitText").innerText = "💎 Premium User";
  } else {
    document.getElementById("limitText").innerText = 
      `Free Limit: ${dailyLimit - used} प्रश्न बचे`;
  }
}

updateLimit();

// ====== AI FUNCTION ======
async function askAI(){

  let q = document.getElementById("question").value;

  if(!q){
    alert("प्रश्न लिखें");
    return;
  }

  if(premium !== "yes" && used >= dailyLimit){
    alert("Free limit खत्म! Premium लें");
    return;
  }

  document.getElementById("answer").innerText = "सोच रहा है...";

  try{

    let response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          {role: "user", content: q}
        ]
      })
    });

    let data = await response.json();

    let answer = data.choices[0].message.content;

    document.getElementById("answer").innerText = answer;

    // increase usage
    if(premium !== "yes"){
      used++;
      localStorage.setItem("used", used);
      updateLimit();
    }

  }catch(e){
    document.getElementById("answer").innerText = "Error आया!";
  }
}

// ====== DEMO PREMIUM BUTTON ======
function goPremium(){
  localStorage.setItem("premium","yes");
  alert("अब आप Premium हो!");
  updateLimit();
}

</script>

</body>
</html>
