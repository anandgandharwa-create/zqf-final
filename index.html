<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Shift</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#071826;
color:#fff;
text-align:center;
}

/* Header */
header{
background:linear-gradient(90deg,#5b2c83,#402060);
padding:16px;
font-size:20px;
font-weight:bold;
}

/* Container */
.container{
padding:20px;
max-width:420px;
margin:auto;
}

/* Card */
.card{
background:linear-gradient(145deg,#132532,#08131c);
border-radius:20px;
padding:20px;
margin-top:20px;
}

/* Input */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
outline:none;
margin-top:10px;
font-size:14px;
}

/* Button */
button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00ffd5,#00a896);
color:#000;
font-weight:bold;
cursor:pointer;
}

/* Output */
.output{
margin-top:20px;
color:#7CFF9E;
font-size:16px;
}
</style>

</head>

<body>

<header>🔁 Thought Shift</header>

<div class="container">

<div class="card">

<h3>अपना विचार बदलें</h3>

<input id="thoughtInput" placeholder="जैसे: मैं यह नहीं कर सकता">

<button onclick="shiftThought()">Shift करें</button>

<div class="output" id="output"></div>

</div>

</div>

<script>

function shiftThought(){

let input = document.getElementById("thoughtInput").value.trim();

if(input === ""){
alert("पहले कोई विचार लिखें");
return;
}

let output = "";

// Smart Replace Logic
if(input.includes("नहीं")){
output = input.replace("नहीं", "कर सकता हूँ");
}
else if(input.includes("डर")){
output = "मैं साहसी हूँ और सुरक्षित हूँ";
}
else if(input.includes("कमजोर")){
output = "मैं मजबूत हूँ";
}
else{
output = "मैं सक्षम हूँ, सब संभव है";
}

// Show Result
document.getElementById("output").innerText = "✨ नया विचार: " + output;

// XP add (optional)
let xp = localStorage.getItem("xp") || 0;
xp++;
localStorage.setItem("xp", xp);

}

</script>

</body>
</html>
