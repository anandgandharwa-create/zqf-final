<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quantum Gyan Adventure</title>

<style>
body {
    margin:0;
    overflow:hidden;
    touch-action:none;
    background: radial-gradient(circle at top, #1a2a6c, #000);
}

/* Glass UI */
.ui {
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    
    color:#FFD700;
    background:rgba(0,0,0,0.75);
    
    padding:10px 20px;
    border-radius:25px;
    
    font-size:16px;
    font-weight:bold;
    
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
    
    letter-spacing: 0.5px;
}

/* Controls premium */
.controls {
    position:fixed;
    bottom:0;
    width:100%;
    
    display:flex;
    justify-content:center;
    gap:25px;

    padding:15px 0;
    
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);

    border-top:1px solid rgba(255,255,255,0.1);
    box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
}

@media (max-width:600px){
    .btn{
        width:60px;
        height:60px;
        font-size:22px;
    }

    .ui{
        font-size:14px;
        padding:8px 15px;
    }
}
.btn {
    width:65px;
    height:65px;
    border-radius:50%;

    background: linear-gradient(145deg, #FFD700, #FF8C00);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:26px;
    color:black;

    box-shadow: 
        0 4px 10px rgba(0,0,0,0.5),
        inset 0 2px 5px rgba(255,255,255,0.3);

    transition: 0.15s;
}

.btn:active {
    transform: scale(0.9);
    box-shadow: 0 2px 5px rgba(0,0,0,0.6);
}
    .popup {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    
    color:#FFD700;
    background:rgba(0,0,0,0.85);
    
    padding:20px 30px;
    border-radius:16px;
    
    font-size:22px;   /* 🔥 बड़ा text */
    font-weight:bold;
    
    text-align:center;
    display:none;
    z-index:9999;

    box-shadow:0 0 25px rgba(255,215,0,0.7);
    text-shadow: 0 0 8px black;
}
</style>
</head>

<body>

<div class="ui">⚡ Level: <span id="level">1</span> | Gyan: <span id="score">0</span></div>
<div class="popup" id="popup"></div>

<canvas id="game"></canvas>

<div class="controls">
    <div class="btn" id="left">⬅️</div>
    <div class="btn" id="jump">⏫</div>
    <div class="btn" id="right">➡️</div>
</div>
<script>
const left = document.getElementById("left");
const right = document.getElementById("right");
const jump = document.getElementById("jump");
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 80;

let cameraX = 0;
let level = 1;
let score = 0;
let lastGyanScore = 0;

let popupActive = false;

const gyan = [
"तुम शरीर नहीं, चेतना हो 🧘‍♂️",
"वर्तमान ही सत्य है ⏳",
"अहंकार ही दुख है 😌",
"शांति भीतर है ✨",
"तुम असीम ऊर्जा हो ⚡"
];

let popupTimeout;

// ✅ SAFE POPUP
function popup(text){
    let p = document.getElementById("popup");

    popupActive = true;
    keys = {}; // 🔥 STOP movement

    clearTimeout(popupTimeout);

    p.innerText = text;
    p.style.display="block";

    popupTimeout = setTimeout(()=>{
        p.style.display="none";
        popupActive = false;
    },2500);
}

let player = {
    x:100,
    y:250,
    w:40,
    h:40,
    dx:0,
    dy:0,
    ground:false
};

let gravity = 0.6;

let platforms = [];
let coins = [];

function generateLevel(){
    platforms = [];
    coins = [];

    for(let i=0;i<20;i++){
        let x = i*250;
        let y = canvas.height - (Math.random()*200 + 100);

        platforms.push({x:x,y:y,w:150,h:20});

        if(Math.random()>0.5){
            coins.push({x:x+50,y:y-30});
        }
    }
}

generateLevel();

// ✅ INPUT SYSTEM FIX
let keys = {};

onkeydown = e=>{
    if(!popupActive) keys[e.key] = true;
};

onkeyup = e=>{
    keys[e.key] = false;
};

function resetKeys(){
    keys = {};
}

// buttons
left.onmousedown = ()=> keys["ArrowLeft"]=true;
left.onmouseup = resetKeys;
left.ontouchstart = ()=> keys["ArrowLeft"]=true;
left.ontouchend = resetKeys;

right.onmousedown = ()=> keys["ArrowRight"]=true;
right.onmouseup = resetKeys;
right.ontouchstart = ()=> keys["ArrowRight"]=true;
right.ontouchend = resetKeys;

jump.onmousedown = ()=> keys[" "]=true;
jump.onmouseup = resetKeys;
jump.ontouchstart = ()=>{
    if(player.ground){
        player.dy = -14;
        player.ground = false;
    }
};
jump.ontouchend = resetKeys;

// ✅ UPDATE (FULL STABLE)
function update(){

    if(popupActive) return; // 🔥 FREEZE during popup

    player.dx = 0;

    if(keys["ArrowRight"]) player.dx = 6;
    if(keys["ArrowLeft"]) player.dx = -6;

    if(keys[" "] && player.ground){
        player.dy = -14;
        player.ground = false;
    }

    player.dy += gravity;
    player.x += player.dx;
    player.y += player.dy;

    player.ground = false;

    // collision
    platforms.forEach(p=>{
        if(player.x < p.x+p.w &&
           player.x+player.w > p.x &&
           player.y < p.y+p.h &&
           player.y+player.h > p.y){

            if(player.dy > 0 && player.y + player.h - player.dy <= p.y){
                player.y = p.y - player.h;
                player.dy = 0;
                player.ground = true;
            }
        }
    });

    // coins
    coins.forEach((c,i)=>{
        if(player.x < c.x+20 &&
           player.x+player.w > c.x &&
           player.y < c.y+20 &&
           player.y+player.h > c.y){

            coins.splice(i,1);
            score++;
            document.getElementById("score").innerText = score;

            if(score % 3 === 0 && score !== lastGyanScore){
                lastGyanScore = score;
                popup(gyan[Math.floor(Math.random()*gyan.length)]);
            }
        }
    });

    // smooth camera
    let targetX = player.x - 200;
    cameraX += (targetX - cameraX) * 0.08;
    cameraX = Math.max(0, cameraX);

    // level change
    if(player.x > platforms.length*250){
        level++;
        cameraX = 0;
        player.x = 100;
        document.getElementById("level").innerText = level;
        generateLevel();
        popup("🎉 Level " + level + " Unlock!");
    }

    // fall reset
    if(player.y > canvas.height){
        popup("⚠️ ध्यान भटक गया");

        setTimeout(()=>{
            player.x = 100;
            player.y = 250;
            player.dy = 0;
            score = 0;
            lastGyanScore = 0;
            cameraX = 0;
            document.getElementById("score").innerText = score;
            generateLevel();
        },1500);
    }
}

// DRAW (same as before)
function draw(){
    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);
    gradient.addColorStop(0,"#141E30");
    gradient.addColorStop(1,"#243B55");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(-cameraX,0);

    function glow(color,blur){
        ctx.shadowColor = color;
        ctx.shadowBlur = blur * 0.4;
    }

    ctx.globalAlpha = 0.9;

    let time = Date.now() * 0.02;

    for(let i=0;i<4;i++){
        let x = i*500 + (time % 500);

        ctx.fillStyle = "#eee";
        ctx.beginPath();
        ctx.arc(x,100,30,0,Math.PI*2);
        ctx.arc(x+30,90,35,0,Math.PI*2);
        ctx.arc(x+60,100,30,0,Math.PI*2);
        ctx.fill();
    }

    ctx.globalAlpha = 1;

    glow("#00ffe0",8);
    ctx.font="50px serif";
    ctx.fillText("🧘‍♂️", player.x, player.y+35);

    ctx.shadowBlur = 0;

    platforms.forEach(p=>{
        glow("#FFD700",6);
        ctx.fillStyle="#FFD700";
        ctx.fillRect(p.x,p.y,p.w,p.h);
    });

    ctx.shadowBlur = 0;

    coins.forEach(c=>{
        glow("gold",5);
        ctx.font="35px serif";
        ctx.fillText("🏆",c.x,c.y + Math.sin(Date.now()/200)*5);
    });

    ctx.restore();
}

// LOOP
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

window.onresize = ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 80;
};
</script>

</body>
</html>
