<html lang="hi">
<head>

<title>अंतरज्ञान मार्गदर्शक</title>

<style>
body{

  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ffcc;

  text-shadow:0 0 10px rgba(0,255,204,0.5);
}
.subtitle{
  text-align:center;
  margin-bottom:15px;
  color:#ccc;
}

.box{
  background:rgba(0,38,38,0.8);
  padding:20px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow: 
    0 0 25px rgba(0,255,204,0.2),

  border:1px solid rgba(0,255,204,0.2);
}
select{
  width:100%;

  border-radius:12px;

}

}

}

  padding:15px;
  background:linear-gradient(180deg,#001f1f,#003333);
  border-radius:14px;

  min-height:60px;
  border-left:3px solid #00ffcc;
  box-shadow:0 0 15px rgba(0,255,204,0.2);
}
.limit{
  text-align:center;
  margin-top:12px;
  color:#ccc;
}

.premium-btn{
  margin-top:12px;
  background:linear-gradient(45deg,#ffcc00,#ff8800);
  color:black;
  font-weight:bold;
  box-shadow:0 0 15px rgba(255,200,0,0.7);

</head>

<body>

<div class="container">

<h1>अंतरज्ञान मार्गदर्शक</h1>
<div class="subtitle">अपने मन के सवाल चुनें और तुरंत मार्गदर्शन पाएं</div>

<div class="box">
<select id="category" onchange="loadQuestions()">
<option value="">श्रेणी चुनें...</option>

<option value="family">👨‍👩‍👧 पारिवारिक प्रश्न</option>
<option value="social">🌍 सामाजिक प्रश्न</option>
<option value="money">💰 आर्थिक प्रश्न</option>
<option value="spiritual">🧘 आध्यात्मिक प्रश्न</option>

</select>

<select id="q">
<option value="">प्रश्न चुनें...</option>
</select>
<button onclick="getAns()">✨ मार्गदर्शन प्राप्त करें</button>

<div class="answer" id="ans">उत्तर यहाँ आएगा...</div>

<div class="limit" id="limitText"></div>

<button class="premium-btn" onclick="goPremium()">💎 Premium लें ₹199</button>

</div>

</div>

<script>

// ===== LIMIT =====
let dailyLimit = 2;
let used = localStorage.getItem("used") || 0;
let premium = localStorage.getItem("premium");

let today = new Date().toDateString();
if(localStorage.getItem("date") !== today){
  localStorage.setItem("used",0);
  localStorage.setItem("date",today);
  used=0;
}

function update(){
  let limitText = document.getElementById("limitText");

  if(premium==="yes"){
    limitText.innerText="💎 Premium (Unlimited)";
  }else{
    limitText.innerText=`Free: ${dailyLimit-used} / 2 बाकी`;
  }
}
update();


// ===== QUESTIONS =====

const Q = {

family:[
{q:"घर में शांति कैसे बनाए रखें?", a:"घर की शांति का आधार व्यक्ति की आंतरिक स्थिति होती है। जब व्यक्ति स्वयं शांत और संतुलित रहता है, तो उसका प्रभाव पूरे वातावरण पर पड़ता है। अनावश्यक अपेक्षाएँ तनाव को जन्म देती हैं, इसलिए उन्हें कम करना जरूरी है। संवाद की स्पष्टता और सुनने की आदत गलतफहमियों को खत्म करती है। नियमित रूप से सकारात्मक ऊर्जा और कृतज्ञता का अभ्यास घर में स्थिरता लाता है।"},

{q:"परिवार में तनाव क्यों होता है?", a:"परिवार में तनाव मुख्यतः अधूरी अपेक्षाओं और संवाद की कमी से उत्पन्न होता है। जब व्यक्ति अपनी भावनाएँ स्पष्ट नहीं करता, तो गलतफहमियाँ बढ़ती हैं। हर व्यक्ति की सोच और अनुभव अलग होते हैं, जिसे समझना आवश्यक है। तुलना और अहंकार भी तनाव को बढ़ाते हैं। समाधान के लिए समझ, धैर्य और खुला संवाद आवश्यक है।"},

{q:"माता-पिता से संबंध कैसे सुधारें?", a:"माता-पिता के साथ संबंध सुधारने के लिए उनके दृष्टिकोण को समझना जरूरी है। पीढ़ियों का अंतर सोच में भिन्नता लाता है, जिसे स्वीकार करना चाहिए। सम्मान और धैर्यपूर्ण संवाद रिश्ते को मजबूत बनाते हैं। समय देना और उनकी भावनाओं को महत्व देना विश्वास बढ़ाता है। धीरे-धीरे यह जुड़ाव गहरा और स्थायी बन जाता है।"},

{q:"पति-पत्नी में समझ कैसे बढ़े?", a:"पति-पत्नी का संबंध संवाद और विश्वास पर आधारित होता है। जब दोनों अपनी बात खुलकर और बिना डर के रखते हैं, तो गलतफहमियाँ कम होती हैं। ego और आरोप संबंध को कमजोर करते हैं, इसलिए उन्हें छोड़ना जरूरी है। एक-दूसरे के दृष्टिकोण को समझना और स्वीकार करना संबंध को संतुलित बनाता है। नियमित संवाद और सहयोग समझ को गहरा करता है।"},

{q:"परिवार में सम्मान कैसे मिले?", a:"सम्मान पाने का पहला नियम है कि आप स्वयं दूसरों को सम्मान दें। व्यक्ति का व्यवहार और भाषा ही उसकी पहचान बनाते हैं। निरंतर सकारात्मक आचरण और जिम्मेदारी निभाना विश्वास पैदा करता है। जब आप बिना स्वार्थ के सहयोग करते हैं, तो लोग स्वाभाविक रूप से सम्मान देते हैं। समय के साथ यह सम्मान स्थायी रूप ले लेता है।"},

{q:"बच्चों को सही मार्ग कैसे दें?", a:"बच्चों को दिशा देने के लिए उन्हें समझना सबसे महत्वपूर्ण है। केवल आदेश देने से नहीं, बल्कि उदाहरण बनकर सिखाना प्रभावी होता है। बच्चों की जिज्ञासा को प्रोत्साहित करना और उन्हें स्वतंत्र सोचने देना जरूरी है। अनुशासन और प्रेम का संतुलन उन्हें सही दिशा देता है। धीरे-धीरे वे स्वयं सही निर्णय लेने लगते हैं।"},

{q:"घर में प्रेम कैसे बढ़े?", a:"प्रेम छोटे-छोटे व्यवहारों से बढ़ता है, न कि बड़े प्रयासों से। appreciation और care से व्यक्ति को महत्व का एहसास होता है। जब परिवार के सदस्य एक-दूसरे को समझते हैं, तो जुड़ाव गहरा होता है। समय देना और साथ में सकारात्मक अनुभव बनाना जरूरी है। इससे घर का वातावरण स्वाभाविक रूप से प्रेमपूर्ण बनता है।"},

{q:"परिवार में झगड़े कैसे रोकें?", a:"झगड़े अक्सर तत्काल प्रतिक्रिया और गुस्से से बढ़ते हैं। जब व्यक्ति प्रतिक्रिया देने से पहले रुकता है, तो स्थिति बदल जाती है। हर विवाद में सही होने की जगह समाधान पर ध्यान देना जरूरी है। संवाद में softness और धैर्य तनाव को कम करते हैं। धीरे-धीरे यह आदत झगड़ों को समाप्त कर देती है।"},

{q:"रिश्तों को मजबूत कैसे करें?", a:"रिश्ते समय, विश्वास और निरंतर प्रयास से मजबूत होते हैं। जब आप दूसरे व्यक्ति को महत्व देते हैं, तो जुड़ाव गहरा होता है। ईमानदारी और consistency रिश्तों की नींव होती है। कठिन समय में साथ देना विश्वास को बढ़ाता है। धीरे-धीरे यह रिश्ता स्थायी और मजबूत बन जाता है।"}
],

social:[
{q:"लोग मुझे समझते क्यों नहीं?", a:"लोग आपको समझ नहीं पाते क्योंकि आपकी अभिव्यक्ति और उनकी समझ में अंतर होता है। हर व्यक्ति अपने अनुभवों के आधार पर सुनता और समझता है। जब संवाद स्पष्ट और सरल नहीं होता, तो गलतफहमियाँ बढ़ती हैं। स्वयं को स्पष्ट रूप से व्यक्त करना और सामने वाले के दृष्टिकोण को समझना आवश्यक है। धीरे-धीरे यह अंतर कम होने लगता है।"},

{q:"समाज में सम्मान कैसे मिले?", a:"समाज में सम्मान किसी एक कार्य से नहीं, बल्कि निरंतर व्यवहार से मिलता है। जब व्यक्ति अपने शब्दों और कर्मों में consistency रखता है, तो विश्वास बनता है। जिम्मेदारी निभाना और दूसरों के लिए उपयोगी बनना सम्मान बढ़ाता है। दिखावे के बजाय वास्तविक योगदान अधिक प्रभाव डालता है। समय के साथ यह सम्मान स्थायी बन जाता है।"},

{q:"दोस्ती कैसे निभाएं?", a:"दोस्ती का आधार विश्वास और पारदर्शिता होता है। जब आप ईमानदारी से संबंध निभाते हैं, तो जुड़ाव मजबूत होता है। केवल अच्छे समय में नहीं, बल्कि कठिन समय में साथ देना जरूरी है। संवाद और समझ दोस्ती को गहराई देते हैं। धीरे-धीरे यह संबंध स्थायी और मजबूत बनता है।"},

{q:"लोगों से डर कैसे खत्म करें?", a:"लोगों का डर आत्मविश्वास की कमी और self-image से जुड़ा होता है। जब आप खुद को स्वीकार नहीं करते, तो दूसरों की राय का डर बढ़ता है। छोटे-छोटे कदम लेकर लोगों से बातचीत करना इस डर को कम करता है। अपने मूल्य को समझना और खुद पर भरोसा करना जरूरी है। धीरे-धीरे यह डर समाप्त होने लगता है।"},

{q:"सामाजिक दबाव कैसे संभालें?", a:"सामाजिक दबाव तब बढ़ता है जब व्यक्ति अपनी पहचान को दूसरों की अपेक्षाओं से जोड़ देता है। हर व्यक्ति की सोच और जीवन अलग होता है, इसे समझना जरूरी है। अपनी प्राथमिकताओं को स्पष्ट करना दबाव को कम करता है। निर्णय लेते समय खुद की आवाज़ को महत्व दें। इससे आप संतुलित और स्वतंत्र महसूस करेंगे।"},

{q:"लोगों की सोच से कैसे बाहर निकलें?", a:"लोगों की सोच से बाहर निकलने के लिए अपनी पहचान को स्पष्ट करना जरूरी है। जब आप खुद को जानते हैं, तो बाहरी राय का प्रभाव कम हो जाता है। हर व्यक्ति की सोच उसके अनुभवों पर आधारित होती है, इसलिए उसे अंतिम सत्य न मानें। अपने लक्ष्य और दिशा पर ध्यान केंद्रित करें। धीरे-धीरे आप स्वतंत्र सोच विकसित कर पाएंगे।"},

{q:"आत्मविश्वास से बात कैसे करें?", a:"आत्मविश्वास अभ्यास और अनुभव से विकसित होता है। जब आप बार-बार बोलने का प्रयास करते हैं, तो डर कम होता है। अपनी बात को सरल और स्पष्ट तरीके से रखना जरूरी है। खुद को कम आंकने की आदत आत्मविश्वास को कमजोर करती है। निरंतर अभ्यास से आपकी अभिव्यक्ति मजबूत होती जाती है।"},

{q:"समाज में पहचान कैसे बनाएं?", a:"पहचान बनाने के लिए निरंतर प्रयास और स्पष्ट दिशा जरूरी है। जब आप किसी क्षेत्र में लगातार काम करते हैं, तो लोग आपको पहचानने लगते हैं। आपके कार्यों की गुणवत्ता आपकी पहचान तय करती है। दूसरों के लिए उपयोगी बनना भी महत्वपूर्ण है। समय के साथ आपकी एक अलग पहचान बन जाती है।"},

{q:"लोगों से जुड़ाव कैसे बढ़ाएं?", a:"जुड़ाव तब बढ़ता है जब आप केवल बोलते नहीं, बल्कि सुनते भी हैं। सामने वाले की भावनाओं को समझना संबंध को गहरा बनाता है। genuine interest और empathy जुड़ाव को मजबूत करते हैं। केवल superficial बातचीत से संबंध गहरे नहीं होते। समय और ध्यान देने से जुड़ाव स्वाभाविक रूप से बढ़ता है।"}
],

money:[
{q:"पैसा क्यों नहीं टिकता?", a:"पैसा न टिकने का मुख्य कारण income नहीं, बल्कि financial awareness की कमी होती है। जब खर्च बिना योजना के होता है, तो आय कितनी भी हो, बचत नहीं बनती। impulsive spending और short-term सोच इस समस्या को बढ़ाते हैं। पैसा तभी टिकता है जब आप उसे consciously manage करते हैं। discipline और tracking से धीरे-धीरे financial control बनता है।"},

{q:"आय कैसे बढ़ाएं?", a:"आय बढ़ाने के लिए केवल मेहनत नहीं, बल्कि सही दिशा में मेहनत जरूरी है। skill development और value creation आय का मूल आधार है। जितनी अधिक समस्या आप हल करते हैं, उतनी अधिक कमाई होती है। एक ही source पर निर्भर रहना जोखिम भरा है, इसलिए multiple income streams बनाना जरूरी है। समय के साथ यह growth को stable बनाता है।"},

{q:"खर्च कैसे नियंत्रित करें?", a:"खर्च नियंत्रण का पहला कदम awareness है कि पैसा कहाँ जा रहा है। जब आप अपने खर्च को track करते हैं, तो unnecessary खर्च स्पष्ट हो जाते हैं। जरूरत और इच्छा में अंतर समझना बहुत जरूरी है। budgeting और planning से financial discipline बनता है। धीरे-धीरे यह आदत आपके पूरे जीवन को स्थिर बना देती है।"},

{q:"अमीर मानसिकता कैसे बनाएं?", a:"अमीर मानसिकता scarcity से नहीं, abundance से सोचने पर बनती है। जब आप अवसरों को देखते हैं, तो growth के रास्ते खुलते हैं। risk लेने और सीखने की आदत इस mindset का हिस्सा है। failure को सीख के रूप में स्वीकार करना जरूरी है। यह सोच धीरे-धीरे आपको financial growth की ओर ले जाती है।"},

{q:"व्यवसाय कैसे शुरू करें?", a:"व्यवसाय शुरू करने के लिए perfect समय नहीं, बल्कि सही mindset जरूरी है। छोटे स्तर से शुरू करके सीखना अधिक प्रभावी होता है। बाजार की जरूरत को समझना और समस्या का समाधान देना जरूरी है। consistency और patience व्यवसाय को बढ़ाते हैं। समय के साथ अनुभव आपको मजबूत बनाता है।"},

{q:"पैसे की चिंता कैसे खत्म करें?", a:"पैसे की चिंता अनिश्चितता और नियंत्रण की कमी से आती है। जब आपके पास financial plan होता है, तो यह चिंता कम हो जाती है। saving और emergency fund सुरक्षा का आधार बनते हैं। long-term सोच आपको स्थिरता देती है। धीरे-धीरे आप पैसे को लेकर सहज हो जाते हैं।"},

{q:"financial stability कैसे पाएं?", a:"financial stability के लिए income, saving और investment तीनों का संतुलन जरूरी है। केवल कमाना पर्याप्त नहीं, बल्कि उसे सही तरीके से manage करना जरूरी है। regular saving और smart investment से stability बनती है। debt control भी महत्वपूर्ण भूमिका निभाता है। समय के साथ यह स्थिरता मजबूत होती जाती है।"},

{q:"निवेश कैसे करें?", a:"निवेश ज्ञान और धैर्य का खेल है, जल्दबाजी का नहीं। बिना समझ के निवेश करना जोखिम बढ़ाता है। पहले basic financial knowledge हासिल करना जरूरी है। long-term investment strategy wealth बनाने में मदद करती है। diversification जोखिम को कम करता है और stability देता है।"},

{q:"धन आकर्षित कैसे करें?", a:"धन आकर्षण केवल सोच से नहीं, बल्कि action और mindset के मेल से होता है। जब आप value create करते हैं, तो पैसा स्वाभाविक रूप से आता है। positive thinking के साथ disciplined action जरूरी है। clarity और consistency wealth creation की कुंजी है। धीरे-धीरे यह प्रक्रिया धन को आकर्षित करती है।"}
],

spiritual:[
{q:"मन शांत कैसे करें?", a:"मन को शांत करने की कोशिश करना ही अशांति का कारण बनता है, क्योंकि मन का स्वभाव ही चलायमान है। वेदांत कहता है कि मन को रोकना नहीं, बल्कि उसे साक्षी भाव से देखना है। जब आप विचारों को पकड़ना छोड़ देते हैं, तो वे स्वतः शांत होने लगते हैं। शांति कोई लक्ष्य नहीं, बल्कि आपकी मूल अवस्था है। उसे पाना नहीं, पहचानना होता है।"},

{q:"ध्यान कैसे शुरू करें?", a:"ध्यान कोई क्रिया नहीं, बल्कि जागरूकता की अवस्था है। इसे करने की बजाय होने देना होता है। शुरुआत में केवल बैठकर अपनी सांसों और विचारों को देखें। बिना किसी नियंत्रण या विरोध के उन्हें आने-जाने दें। धीरे-धीरे आप observer बन जाते हैं, और वहीं से ध्यान की वास्तविक शुरुआत होती है।"},

{q:"ईश्वर को कैसे महसूस करें?", a:"ईश्वर कोई बाहरी सत्ता नहीं, बल्कि चेतना का ही शुद्ध रूप है। जब मन शांत और स्थिर होता है, तब यह अनुभव स्पष्ट होता है। वेदांत के अनुसार 'अहं ब्रह्मास्मि' — आप ही वह चेतना हैं। बाहर खोजने की बजाय भीतर की जागरूकता में उतरना जरूरी है। अनुभव ही सच्चा प्रमाण है, न कि केवल विश्वास।"},

{q:"जीवन का उद्देश्य क्या है?", a:"जीवन का उद्देश्य बाहरी उपलब्धियों में नहीं, बल्कि आत्म-ज्ञान में छिपा है। वेदांत कहता है कि स्वयं को जानना ही सर्वोच्च उद्देश्य है। जब आप अपनी वास्तविक पहचान को समझते हैं, तो जीवन के सभी भ्रम समाप्त होने लगते हैं। बाहरी सफलता अस्थायी है, लेकिन आत्मबोध स्थायी शांति देता है। यही जीवन की अंतिम दिशा है।"},

{q:"आत्मज्ञान कैसे प्राप्त करें?", a:"आत्मज्ञान प्राप्त करने के लिए बाहरी ज्ञान से अधिक आंतरिक जागरूकता जरूरी है। स्व-अवलोकन (self-inquiry) इसका मुख्य मार्ग है। 'मैं कौन हूँ?' इस प्रश्न पर गहराई से ध्यान देना पड़ता है। वेदांत के अनुसार आत्मा साक्षी है, जो सब कुछ देखती है पर प्रभावित नहीं होती। इस सत्य को अनुभव करना ही आत्मज्ञान है।"},

{q:"अहंकार कैसे छोड़ें?", a:"अहंकार कोई वस्तु नहीं जिसे छोड़ा जा सके, बल्कि यह एक गलत पहचान है। जब आप स्वयं को शरीर और विचारों से जोड़ लेते हैं, तब अहंकार बनता है। इसे खत्म करने के लिए इसे समझना जरूरी है, न कि उससे लड़ना। साक्षी भाव में रहते हुए आप देखते हैं कि अहंकार स्वतः कमजोर होता जाता है। अंततः यह भ्रम समाप्त हो जाता है।"},

{q:"वर्तमान में कैसे जियें?", a:"वर्तमान में जीना प्रयास से नहीं, समझ से संभव होता है। जब आप अतीत और भविष्य के विचारों को पहचानते हैं, तो उनसे दूरी बनती है। वर्तमान ही एकमात्र वास्तविकता है, बाकी सब मानसिक कल्पना है। वेदांत कहता है कि जागरूकता में रहना ही वर्तमान में जीना है। यह अभ्यास नहीं, बल्कि समझ की अवस्था है।"},

{q:"आध्यात्मिक प्रगति कैसे करें?", a:"आध्यात्मिक प्रगति कोई बाहरी उपलब्धि नहीं, बल्कि भीतर की गहराई में उतरने की प्रक्रिया है। नियमित साधना, ध्यान और स्व-अवलोकन इसमें मदद करते हैं। वेदांत में ज्ञान, भक्ति और कर्म तीनों मार्ग महत्वपूर्ण हैं। जैसे-जैसे जागरूकता बढ़ती है, भ्रम कम होता जाता है। यही वास्तविक प्रगति है।"},

{q:"भीतर की आवाज़ कैसे सुनें?", a:"भीतर की आवाज़ मन के शोर में दब जाती है। जब आप शांत होकर ध्यान में बैठते हैं, तो यह स्पष्ट होने लगती है। यह intuition है, जो आपकी गहरी चेतना से आती है। वेदांत के अनुसार यह आत्मा की अभिव्यक्ति है। इसे सुनने के लिए बाहरी शोर को कम करना और भीतर की ओर जाना जरूरी है।"}
]

};


// ===== LOAD QUESTIONS =====
function loadQuestions(){

let cat = document.getElementById("category").value;
let q = document.getElementById("q");

q.innerHTML = '<option value="">प्रश्न चुनें...</option>';

if(Q[cat]){
  Q[cat].forEach((item,i)=>{
    q.innerHTML += `<option value="${cat}-${i}">${item.q}</option>`;
  });

  q.size = Q[cat].length; // 👈 show all
}

}

// ===== GET ANSWER =====
function getAns(){

let val = document.getElementById("q").value;

if(!val){
  alert("प्रश्न चुनें");
  return;
}

let parts = val.split("-");
let cat = parts[0];
let index = parts[1];

let selected = Q[cat][index];

if(premium!=="yes" && used>=dailyLimit){
  alert("Free limit खत्म! Premium लें ₹199");
  return;
}

// loading effect
let ans = document.getElementById("ans");

ans.innerHTML = '<span style="color:#FFD700;text-shadow:0 0 6px rgba(255,215,0,0.6)">✨ संदेश प्राप्त हो रहा है... प्रतीक्षा करें...</span>';

setTimeout(()=>{

ans.innerHTML = '<span style="color:#FFD700">✨ संदेश प्राप्त हो रहा है... प्रतीक्षा करें...</span><br><br>' + selected.a;

  if(premium!=="yes"){
    used++;
    localStorage.setItem("used",used);
    update();
  }

},3000);

}


// ===== PREMIUM =====
function goPremium(){
localStorage.setItem("premium","yes");
premium="yes";
alert("🎉 Premium activated");
update();
}
document.getElementById("q").addEventListener("change", function(){
  this.size = 1;
});
</script>
