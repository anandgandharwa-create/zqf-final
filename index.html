<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Gyan Runner</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: 'Segoe UI';
    background: linear-gradient(180deg, #020024, #090979, #00d4ff);
}

/* Top UI */
.ui {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.15);
    padding:10px 25px;
    border-radius:25px;
    color:white;
    font-size:18px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

/* Popup */
.popup {
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:12px 18px;
    border-radius:12px;
    color:#fff;
    font-size:16px;
    display:none;
    text-align:center;
}

/* Controls */
.controls {
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn {
    width:65px;
    height:65px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:26px;
    color:white;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="ui">⚡ Consciousness: <span id="score">0</span></div>
<div class="popup" id="popup"></div>

<canvas id="game"></canvas>

<div class="controls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="jump">▲</div>
    <div class="btn" id="right">▶</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let gravity = 0.7;
let score = 0;

const gyan = [
"तुम चेतना हो 🧘‍♂️",
"शांति भीतर है ✨",
"अहंकार छोड़ो 😌",
"वर्तमान में जियो ⏳",
"ऊर्जा ही सत्य है ⚡"
];

function showPopup(text){
    let p = document.getElementById("popup");
    p.innerText = text;
    p.style.display = "block";
    setTimeout(()=>p.style.display="none",1500);
}

let player = {
    x:100,
    y:0,
    w:40,
    h:40,
    dx:0,
    dy:0,
    grounded:false
};

let platforms = [
{x:0,y:canvas.height-40,w:canvas.width,h:40},
{x:250,y:canvas.height-160,w:140,h:20},
{x:500,y:canvas.height-260,w:140,h:20},
{x:800,y:canvas.height-200,w:140,h:20}
];

let coins = [
{x:280,y:canvas.height-190},
{x:530,y:canvas.height-290},
{x:830,y:canvas.height-230}
];

let enemies = [
{x:600,y:canvas.height-60,w:40,h:40,dir:1}
];

let keys={};

onkeydown=e=>keys[e.key]=true;
onkeyup=e=>keys[e.key]=false;

// mobile
left.ontouchstart=()=>keys["ArrowLeft"]=true;
left.ontouchend=()=>keys["ArrowLeft"]=false;

right.ontouchstart=()=>keys["ArrowRight"]=true;
right.ontouchend=()=>keys["ArrowRight"]=false;

jump.ontouchstart=()=>keys[" "]=true;
jump.ontouchend=()=>keys[" "]=false;

function update(){

    player.dx=0;
    if(keys["ArrowRight"]) player.dx=6;
    if(keys["ArrowLeft"]) player.dx=-6;

    if(keys[" "] && player.grounded){
        player.dy=-14;
        player.grounded=false;
    }

    player.dy+=gravity;
    player.x+=player.dx;
    player.y+=player.dy;

    player.grounded=false;

    platforms.forEach(p=>{
        if(player.x<p.x+p.w && player.x+player.w>p.x &&
           player.y<p.y+p.h && player.y+player.h>p.y){

            if(player.dy>0){
                player.y=p.y-player.h;
                player.dy=0;
                player.grounded=true;
            }
        }
    });

    coins.forEach((c,i)=>{
        if(player.x<c.x+20 && player.x+player.w>c.x &&
           player.y<c.y+20 && player.y+player.h>c.y){

            showPopup(gyan[Math.floor(Math.random()*gyan.length)]);
            coins.splice(i,1);
            score++;
            document.getElementById("score").innerText=score;
        }
    });

    enemies.forEach(e=>{
        e.x+=e.dir*2.5;
        if(e.x<500||e.x>900) e.dir*=-1;

        if(player.x<e.x+e.w && player.x+player.w>e.x &&
           player.y<e.y+e.h && player.y+player.h>e.y){

            showPopup("😈 Negative thought triggered!");
            setTimeout(()=>location.reload(),1200);
        }
    });

    if(player.y>canvas.height){
        showPopup("⚠️ ध्यान भटक गया!");
        setTimeout(()=>location.reload(),1200);
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Player emoji
    ctx.font = "35px serif";
    ctx.fillText("🧘‍♂️", player.x, player.y+35);

    // Platforms
    ctx.fillStyle="#ffffff";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    // Coins
    ctx.font="24px serif";
    coins.forEach(c=>ctx.fillText("✨",c.x,c.y));

    // Enemies
    ctx.font="30px serif";
    enemies.forEach(e=>ctx.fillText("😈",e.x,e.y+30));
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
